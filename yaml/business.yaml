        name:
          type: string
          description: Category name of the reason for the exchange.
    ExchangeReasons:
      type: array
      items:
        $ref: '#/components/schemas/ExchangeReason'
      description: The list of available exchange reasons.
      example:
        - code: business_expense_and_claims
          name: Business expense and claims
        - code: fees_and_charges
          name: Fees and charges
        - code: fund_transfer_and_intracompany_payment
          name: Fund transfer and intracompany payment
        - code: gifts_and_donations
          name: Gifts and donations
        - code: government_services_and_tax
          name: Government services and tax
        - code: insurance
          name: Insurance
        - code: inventory
          name: Inventory
        - code: investment_dividend_and_interest
          name: Investment, dividend and interest
        - code: loan_and_loan_repayment
          name: Loan and loan repayment
        - code: marketing
          name: Marketing
        - code: payment_for_goods_and_services
          name: Payment for goods and services
        - code: payroll
          name: Payroll
        - code: refund
          name: Refund
        - code: rental_and_property
          name: Rental and property
        - code: sales
          name: Sales
        - code: service_provider_and_software
          name: Service provider and software
        - code: travel_and_transportation
          name: Travel and transportation
        - code: utilities
          name: Utilities
    ExchangeReasonCode:
      type: string
      description: |-
        The reason code for the exchange.
        Depending on the country and the amount of funds to be exchanged, you might be required to provide an exchange reason. 
        You can check available reason codes with the [`GET /exchange-reasons` operation](https://developer.revolut.com/docs/api/business#get-exchange-reasons).

        If an exchange reason is not required, this field is ignored.
      example: fund_transfer_and_intracompany_payment
    ExchangeRequest:
      type: object
      description: The exchange information.
      properties:
        from:
          $ref: '#/components/schemas/ExchangePartFrom'
        to:
          $ref: '#/components/schemas/ExchangePartTo'
        reference:
          type: string
          description: |-
            The reference for the exchange transaction, provided by you.
            It helps you to identify the transaction if you want to look it up later.
        request_id:
          type: string
          description: |-
            The ID of the request, provided by you.
            It helps you identify the transaction in your system.

            :::warning
            To ensure that an exchange transaction is not processed multiple times if there are network or system errors,
            the same `request_id` should be used for requests related to the same transaction.
            :::
          maxLength: 40
        exchange_reason_code:
          $ref: '#/components/schemas/ExchangeReasonCode'
      required:
        - from
        - to
        - request_id
    ExchangeResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: The ID of the created transaction.
        type:
          type: string
          description: The type of the transaction. For money exchange, it is `exchange`.
        reason_code:
          type: string
          description: |-
            The reason why the transaction was failed or declined.

            Present only when the `state` parameter of the transaction is `declined` or `failed`.
        created_at:
          type: string
          format: date-time
          description: The date and time the transaction was created in [ISO 8601](https://en.wikipedia.org/wiki/ISO_8601) format.
        completed_at:
          type: string
          format: date-time
          description: The date and time the transaction was completed in [ISO 8601](https://en.wikipedia.org/wiki/ISO_8601) format.
        state:
          $ref: '#/components/schemas/TransactionState'
    Expense:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: The ID of the expense.
        state:
          $ref: '#/components/schemas/ExpenseState'
        transaction_type:
          $ref: '#/components/schemas/ExpenseTransactionType'
        description:
          type: string
          description: The description of the expense.
        submitted_at:
          type: string
          format: date-time
          description: The date and time the expense was submitted in [ISO 8601](https://en.wikipedia.org/wiki/ISO_8601) format.
        completed_at:
          type: string
          format: date-time
          description: The date and time the expense was completed in [ISO 8601](https://en.wikipedia.org/wiki/ISO_8601) format.
        payer:
          type: string
          description: The name of the [team member](https://developer.revolut.com/docs/api/business#delete-team-member) who made the transaction, refund request, or ATM withdrawal, or the name of the business if the related transaction is of type `fee`.
        merchant:
          type: string
          description: The name of the merchant.
        transaction_id:
          type: string
          format: uuid
          description: The ID of the [transaction](https://developer.revolut.com/docs/api/business#get-transaction) related to the expense. Not available for transactions of type `external`.
        expense_date:
          type: string
          format: date-time
          description: |-
            The expense data depends on the type of the expense and whether it has been completed.

            Typically, it's the date and time of the expense [transaction](https://developer.revolut.com/docs/api/business#get-transaction) in [ISO 8601](https://en.wikipedia.org/wiki/ISO_8601) format.
            - If the transaction related to the expense is completed, it is the date and time of its completion ([`completed_at`](https://developer.revolut.com/docs/api/business#get-transaction#response)).
            - Otherwise, it is the date and time of its creation ([`created_at`](https://developer.revolut.com/docs/api/business#get-transaction#response)).

            For reimbursements, it's the payment date provided in the reimbursement request.
        labels:
          type: object
          description: |-
            The [labels](https://developer.revolut.com/docs/api/business#delete-label) added to the expense, organised in groups.

            You can have up to 5 label groups, with max. 1 label per group.

            The labels are provided as an object, where each key is the name of a label group, and each value is a single-element array containing the selected label from that group.
          maxProperties: 5
          additionalProperties:
            $ref: '#/components/schemas/LabelGroup'
          example:
            Office supplies:
              - Photocopying
            Department:
              - HR
        splits:
          type: array
          description: |-
            The splits of the expense.

            A single expense can be divided into multiple parts (splits), for example, to allocate different portions of the expense to different categories.
          items:
            $ref: '#/components/schemas/ExpenseSplit'
        receipt_ids:
          type: array
          description: The IDs of the receipts related to the expense.
          items:
            type: string
            format: uuid
        spent_amount:
          type: object
          description: The expense amount in billed currency.
          properties:
            amount:
              $ref: '#/components/schemas/Amount'
            currency:
              $ref: '#/components/schemas/Currency'
          required:
            - amount
            - currency
      required:
        - id
        - state
        - transaction_type
        - expense_date
        - labels
        - splits
        - spent_amount
        - receipt_ids
    Expenses:
      type: array
      items:
        $ref: '#/components/schemas/Expense'
    ExpenseSplit:
      type: object
      required:
        - amount
        - category
        - tax_rate
      properties:
        amount:
          type: object
          description: The original amount of the expense split.
          properties:
            amount:
              $ref: '#/components/schemas/Amount'
            currency:
              $ref: '#/components/schemas/Currency'
        category:
          $ref: '#/components/schemas/Category'
        tax_rate:
          $ref: '#/components/schemas/TaxRate'
    ExpenseState:
      enum:
        - missing_info
        - awaiting_review
        - rejected
        - pending_reimbursement
        - refund_requested
        - refunded
        - approved
        - reverted
      description: |-
        Indicates the state of the expense. Possible values:

          - `missing_info`: The expense is missing some required information.

            This is the initial state of the expense when it's first created.
            Once the missing information is provided, the expense is ready to be submitted.

          - `awaiting_review`: The expense is awaiting approval before it can be completed.

            The approver can approve, reject, or request repayment for the expense.
            It is also possible for the submitter to undo the submission at this stage.

          - `rejected`: The expense has been rejected by the approver. 

            The expense submitter (typically, the payer) should fix the issue that was the reason for the rejection and resubmit the expense.

          - `pending_reimbursement`: The reimbursement request has been approved, and the expense is awaiting reimbursement.

            This state is possible for reimbursements (transaction type = `External`). 

          - `refund_requested`: The expense has been rejected and repayment has been requested.*

            This state is possible for card transactions.
            It indicates that following the review, the approver rejected the expense and requested that it be paid back to the business account.
            This can happen, for example, if an employee accidentally makes a personal purchase with their business card.
            Once the money has been returned, the **admin** can mark this expense as repaid.

          - `refunded`: The expense has been repaid.*

            This state indicates that the admin has marked the expense as repaid.

          - `approved`: The expense has been approved and is now completed.*

          - `reverted`: The expense has been reverted. 

            This status indicates that the transaction related to the expense has been reverted.
            In such a case, the expense status is automatically set to `reverted`, and the expense is completed.
            This can happen, for example, when the transaction has been reverted by the merchant.

        _*Additionally, if an admin has previously approved the expense, marked it as repaid/completed, or requested repayment, they can revert their decision.
        In such a case, the expense goes back to the initial `missing_info` state._

        For more information, see the guides: [Retrieve expenses and receipts](https://developer.revolut.com/docs/guides/manage-accounts/accounts-and-transactions/retrieve-expenses#expense-state).
      type: string
    ExpenseTransactionType:
      enum:
        - atm
        - card_payment
        - fee
        - transfer
        - external
        - mileage_reimbursement
        - rev_payment
      description: The type of the [transaction](https://developer.revolut.com/docs/api/business#get-transaction) related to the expense.
      type: string
    Fee:
      type: object
      properties:
        amount:
          type: number
          format: double
          description: The fee amount.
        currency:
          $ref: '#/components/schemas/Currency'
    IndicativeQuoteEstimatedArrival:
      type: object
      description: |-
        Estimated time and speed of funds arrival in relation to the current date and time.
        Present if such information is available.
      properties:
        date:
          type: string
          format: date
          description: The estimated arrival date provided in [ISO 8601](https://en.wikipedia.org/wiki/ISO_8601) format.
        speed:
          type: string
          enum:
            - instant
            - in_seconds
            - today
            - tomorrow
            - by_date
          description: |-
            The expected speed of the transfer.

            Possible values are:
            - **`instant`**: The funds are expected to reach the recipient **immediately** after the transfer is created.
            - **`in_seconds`**: The funds are expected to reach the recipient **within 5 minutes** after the transfer is created.
            - **`today`**: The funds are expected to reach the recipient by the end of the **same day** the transfer is created.
            - **`tomorrow`**: The funds are expected to reach the recipient by the end of the **day after** the transfer is created.
            - **`by_date`**: The funds are expected to reach the recipient by the end of the **day specified** in the `date` parameter.
      required:
        - date
        - speed
    IndicativeQuoteFee:
      type: object
      description: Details of the total fee for the transfer.
      properties:
        amount:
          type: number
          format: double
          description: Fee amount in major units.
        currency:
          $ref: '#/components/schemas/Currency'
        breakdown:
          $ref: '#/components/schemas/IndicativeQuoteFeeBreakdown'
      required:
        - amount
        - currency
    IndicativeQuoteFeeBreakdown:
      type: object
      description: |-
        Breakdown of transfer and exchange fees.

        When the total `fee` is zero, this field is omitted from the response.
      properties:
        transfer_fee:
          $ref: '#/components/schemas/SimpleFee'
        exchange_fee:
          $ref: '#/components/schemas/SimpleFee'
    IndicativeQuoteRequest:
      type: object
      description: The request details for an indicative quote.
      properties:
        account_id:
          type: string
          format: uuid
          description: The ID of the account from which the transfer will be made.
        receiver:
          $ref: '#/components/schemas/PaymentReceiver'
        amount:
          type: number
          format: double
          description: The transfer amount in major units.
        currency:
          $ref: '#/components/schemas/Currency'
        charge_bearer:
          $ref: '#/components/schemas/ChargeBearer'
        transfer_reason_code:
          $ref: '#/components/schemas/TransferReasonCode'
        exchange_reason_code:
          $ref: '#/components/schemas/ExchangeReasonCode'
      required:
        - account_id
        - receiver
        - amount
        - currency
    IndicativeQuoteResponse:
      type: object
      description: The expected processing attributes for a potential transfer.
      properties:
        amount:
          $ref: '#/components/schemas/Money'
          description: Amount the recipient receives before fees are deducted, in major units.
        fee:
          $ref: '#/components/schemas/IndicativeQuoteFee'
          description: Total fee for the transfer (in source or target currency).
        estimated_total:
          $ref: '#/components/schemas/Money'
          description: Total amount of money which will be charged on the sender's account.
        estimated_exchange_rate:
          type: string
          description: |-
            Exchange rate for the transfer.

            For same-currency transfers, this field is omitted from the response.
        estimated_amount_after_exchange:
          $ref: '#/components/schemas/Money'
          description: |-
            Amount of the money converted to the sender's currency.

            For same-currency transfers, this field is omitted from the response.
        estimated_arrival:
          $ref: '#/components/schemas/IndicativeQuoteEstimatedArrival'
        warnings:
          type: array
          description: |-
            Potential warnings regarding the quote:

            - `volatile_fx_rate`: Returned when the specified FX rate is volatile.
          items:
            type: string
            enum:
              - volatile_fx_rate
      required:
        - amount
        - fee
        - estimated_total
    IndividualName:
      type: object
      description: |-
        The name of the counterparty, provided when the counterparty is an **individual** (personal account type) and is **not** being added via Revtag.

        If specified, `company_name` and `name` must be empty.
      properties:
        first_name:
          type: string
          description: The first name of the individual counterparty.
        last_name:
          type: string
          description: The last name of the individual counterparty.
    LabelGroup:
      type: array
      description: |-
        A label group with the selected label from that group.

        For example, you might have a label group called **Department**, and the label you select from that group might be **HR**: `"Department": [ "HR" ]`.
      minItems: 1
      maxItems: 1
      example:
        - HR
      items:
        type: string
        description: The name of the selected label.
        example: HR
    LabelGroupResponse:
      type: object
      required:
        - id
        - name
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
          description: The unique ID of the label group.
          readOnly: true
        name:
          type: string
          description: The name of the label group.
          minLength: 1
          maxLength: 100
        created_at:
          type: string
          format: date-time
          description: The date and time the label group was created in [ISO 8601](https://en.wikipedia.org/wiki/ISO_8601) format.
          readOnly: true
        updated_at:
          type: string
          format: date-time
          description: The date and time the label group was last updated in [ISO 8601](https://en.wikipedia.org/wiki/ISO_8601) format.
          readOnly: true
    LabelResponse:
      type: object
      required:
        - id
        - name
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
          description: The unique ID of the label.
          readOnly: true
        name:
          type: string
          description: The name of the label.
          minLength: 1
          maxLength: 100
        created_at:
          type: string
          format: date-time
          description: The date and time the label was created in [ISO 8601](https://en.wikipedia.org/wiki/ISO_8601) format.
          readOnly: true
        updated_at:
          type: string
          format: date-time
          description: The date and time the label was last updated in [ISO 8601](https://en.wikipedia.org/wiki/ISO_8601) format.
          readOnly: true
    MerchantControlsSchema:
      type: object
      required:
        - control_type
        - merchant_ids
      properties:
        control_type:
          type: string
          enum:
            - block
            - allow
