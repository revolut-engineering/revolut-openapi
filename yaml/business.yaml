        Cursor for the next page. 
        Used for pagination when the total number of results exceeds the maximum number per page.

        To get the next page of results, make a new request and set `page_token` to the `next_page_token` value returned in the previous response.
        :::note
        If there are no more results to fetch, `next_page_token` is not returned in the response.
        :::
      example: MjAyNi0wMS0wMVQwOToxMzoxNS40MDZaN2RhNTFjZGY0LTZiYjctNDRkNi04OWU1LTc2OWEzZGYxZDc5ZA
    PaymentDraftsResponse:
      type: object
      required:
        - payment_orders
      properties:
        payment_orders:
          type: array
          description: The list of payment drafts that haven't been sent for processing.
          items:
            $ref: '#/components/schemas/PaymentOrderInfo'
    PaymentInfo:
      type: object
      description: The details of the payment draft.
      properties:
        id:
          type: string
          format: uuid
          description: |-
            The ID of the payment.

            Do not confuse it with the [payment draft ID](https://developer.revolut.com/docs/api/business#get-payment-drafts#response) or [transaction ID](https://developer.revolut.com/docs/api/business#get-transaction).
        amount:
          $ref: '#/components/schemas/AmountWithCurrency'
        currency:
          $ref: '#/components/schemas/Currency'
        account_id:
          type: string
          format: uuid
          description: The ID of the account to pay from.
        receiver:
          $ref: '#/components/schemas/PaymentReceiver'
        state:
          $ref: '#/components/schemas/PaymentState'
        reason:
          type: string
          description: The reason for the current state.
        error_message:
          type: string
          description: The description of the error message.
        current_charge_options:
          type: object
          description: The explanation of conversion process.
          required:
            - from
            - to
          properties:
            from:
              $ref: '#/components/schemas/AmountWithCurrency'
            to:
              $ref: '#/components/schemas/AmountWithCurrency'
            rate:
              type: string
            fee:
              $ref: '#/components/schemas/AmountWithCurrency'
        reference:
          type: string
          description: The description of the transaction.
        transfer_reason_code:
          $ref: '#/components/schemas/TransferReasonCode'
      required:
        - id
        - amount
        - account_id
        - receiver
        - state
        - current_charge_options
    PaymentOrderInfo:
      type: object
      description: A list of payments.
      properties:
        id:
          type: string
          format: uuid
          description: The ID of the payment draft.
        scheduled_for:
          type: string
          format: date
          description: The scheduled date of the payment draft in [ISO 8601](https://en.wikipedia.org/wiki/ISO_8601) format.
        title:
          type: string
          description: The title of the payment draft.
        payments_count:
          type: integer
          description: The number of payments in the payment draft.
        source:
          type: string
          description: The source from which the payment draft was created.
          enum:
            - api
            - integration
            - email
            - business_app
      required:
        - id
        - payments_count
    PaymentReceiver:
      type: object
      description: |-
        The details of the transfer recipient.

        If the counterparty has multiple payment methods available (e.g. 2 accounts, or 1 account and 1 card), you must specify the account (`account_id`) or card (`card_id`) to which you want to transfer the money.
      properties:
        counterparty_id:
          type: string
          format: uuid
          description: The ID of the receiving counterparty.
        account_id:
          type: string
          format: uuid
          description: |-
            The ID of the receiving counterparty's account. Used for bank transfers.

            If the counterparty has multiple payment methods available, use it to specify the account to which you want to send the money.
        card_id:
          type: string
          format: uuid
          description: |-
            The ID of the receiving counterparty's card.
            Used for card transfers.

            If the counterparty has multiple payment methods available, use it to specify the card to which you want to send the money.
      required:
        - counterparty_id
    PaymentRequest:
      type: object
      description: The details of the draft payment.
      properties:
        account_id:
          type: string
          format: uuid
          description: |-
            The ID of the account to pay from. 

            :::note
            You can specify only one account ID for multiple payments in the same payment draft.
            :::
        receiver:
          $ref: '#/components/schemas/PaymentReceiver'
        amount:
          type: number
          format: double
          exclusiveMinimum: true
          minimum: 0
          description: The amount of the payment.
        currency:
          $ref: '#/components/schemas/Currency'
        reference:
          type: string
          maxLength: 255
          description: |-
            The reference for the payment.
            A piece of text or number you provide to help identify what the payment relates to.
            It can be used, for example, for reconciliation or tracking purposes.

            You might include an invoice number, account or transaction ID, or any other reference meaningful to you.
        charge_bearer:
          type: string
          description: |-
            The party that should bear the transaction fees related to the selected transaction route if applied.
            Possible options are: 
            - `shared`: Also known as **SHA**. The transaction route fees are split between the sender and the recipient. 
              The sender pays the fees charged by their bank, while the recipient pays the fees charged by the receiving and any intermediary banks.
            - `debtor`: Also known as **OUR**. The sender pays all explicit transaction fees.

            :::note
            - This field is not supported for [bulk payments](https://developer.revolut.com/docs/guides/manage-accounts/transfers/payment-drafts#use-cases). 
            - Some transactions with fees might not support charge bearer selection.
              If this is the case, the request will return an error.
              To proceed with the default fee handling, remove this field from your request and try again.
            :::
          enum:
            - shared
            - debtor
        transfer_reason_code:
          $ref: '#/components/schemas/TransferReasonCode'
      required:
        - account_id
        - receiver
        - amount
        - currency
        - reference
    PaymentRequirementsRequest:
      type: object
      description: The request details to evaluate payment requirements.
      properties:
        account_id:
          type: string
          format: uuid
          description: The ID of the account from which the transfer will be made.
        receiver:
          $ref: '#/components/schemas/PaymentReceiver'
      required:
        - account_id
        - receiver
    PaymentRequirementsResponse:
      type: object
      description: The response containing applicable payment fields and their validation rules.
      properties:
        fields:
          type: array
          description: A list of applicable and conditionally required fields for the specific payment context.
          items:
            $ref: '#/components/schemas/PaymentRequirementsField'
      required:
        - fields
    PaymentRequirementsField:
      type: object
      description: Represents a contextual field and its rules.
      properties:
        name:
          type: string
          description: |-
            The name of the field to be provided in the [`/pay` endpoint](https://developer.revolut.com/docs/business#create-payment) request body. 
            Matches the field names in the `/pay` endpoint exactly (e.g. `reference`, `transfer_reason_code`).
        required:
          type: boolean
          description: Indicates whether this field must be provided for the given transfer.
        validation:
          $ref: '#/components/schemas/PaymentRequirementsFieldValidation'
        options:
          type: array
          description: |-
            A list of allowed values for the field (enum).
            If provided, the field value must be one of these options.
          items:
            $ref: '#/components/schemas/PaymentRequirementsFieldOption'
      required:
        - name
        - required
    PaymentRequirementsFieldValidation:
      type: object
      description: Validation rules applied to the field.
      properties:
        min_length:
          type: integer
          description: The minimum allowed character length for the field value.
        max_length:
          type: integer
          description: The maximum allowed character length for the field value.
        regex:
          $ref: '#/components/schemas/PaymentRequirementsFieldRegex'
    PaymentRequirementsFieldRegex:
      type: object
      description: Regular expression validation rules.
      properties:
        pattern:
          type: string
          description: The regex pattern the field value must match.
        description:
          type: string
          description: A human-readable description of the regex constraint.
      required:
        - pattern
        - description
    PaymentRequirementsFieldOption:
      type: object
      description: An allowed value option for the field.
      properties:
        value:
          type: string
          description: The accepted value to be passed to the API.
        default: null
        type: boolean
        description: Indicates the default option for the field if there is one.
      required:
        - value
    PaymentState:
      enum:
        - CREATED
        - PENDING
        - COMPLETED
        - REVERTED
        - DECLINED
        - CANCELLED
        - FAILED
        - DELETED
      type: string
      description: Indicates the state of the transaction.
    PaymentSystem:
      enum:
        - chaps
        - bacs
        - faster_payments
        - sepa
        - swift
        - ach
        - elixir
        - sorbnet
        - nics
        - rix
        - sumclearing
      example: swift
      type: string
      description: Indicates the payment scheme used to execute transactions.
    PayoutLinkInitialProps:
      type: object
      required:
        - id
        - state
        - created_at
        - updated_at
        - counterparty_name
        - request_id
        - payout_methods
        - account_id
        - amount
        - currency
        - reference
        - save_counterparty
      properties:
        id:
          type: string
          format: uuid
          description: The ID of the payout link.
        state:
          $ref: '#/components/schemas/PayoutLinkState'
        created_at:
          type: string
          format: date-time
          description: The date and time the payout link was created in [ISO 8601 format](https://en.wikipedia.org/wiki/ISO_8601).
        updated_at:
          type: string
          format: date-time
          description: The date and time the payout link was last updated in [ISO 8601 format](https://en.wikipedia.org/wiki/ISO_8601).
        counterparty_name:
          $ref: '#/components/schemas/PayoutLinkCounterpartyName'
        save_counterparty:
          type: boolean
          default: false
          description: |-
            Indicates whether you chose to save the recipient as your counterparty upon link claim. 
            If `false` then the counterparty will not show up on your counterparties list, for example, when you [retrieve your counterparties](https://developer.revolut.com/docs/api/business#get-counterparties). 
            However, you can still [retrieve this counterparty by its ID](https://developer.revolut.com/docs/api/business#get-counterparty).

            If you didn't choose to save the counterparty on link creation, you can still do it from your transactions list in the Business app.
        request_id:
          $ref: '#/components/schemas/PayoutLinkRequestId'
        expiry_date:
          $ref: '#/components/schemas/PayoutLinkExpiryDate'
        payout_methods:
          $ref: '#/components/schemas/PayoutLinkPayoutMethods'
        account_id:
          $ref: '#/components/schemas/PayoutLinkAccountId'
        amount:
          $ref: '#/components/schemas/PayoutLinkAmount'
        currency:
          $ref: '#/components/schemas/Currency'
        url:
          type: string
          format: uri
          description: The URL of the payout link. Returned only for active payout links.
        reference:
          $ref: '#/components/schemas/PayoutLinkReference'
        transfer_reason_code:
          $ref: '#/components/schemas/TransferReasonCode'
    PayoutLinkAdditionalProps:
      type: object
      properties:
        counterparty_id:
          type: string
          format: uuid
          description: |-
            The ID of the counterparty created based on the recipient's details. 

            :::note
            By default, the newly created counterparty is hidden from your counterparties list. 

            To automatically save it when the link is claimed, pass the `save_counterparty` parameter set to `true`. 

            Alternatively, you can add the recipient to your counterparties later from the list of transactions in the Business app.
            :::
        transaction_id:
          type: string
          format: uuid
          description: The ID of the created transaction. Returned only if the payout has been claimed.
        cancellation_reason:
          type: string
          readOnly: true
          enum:
            - too_many_name_check_attempts
          description: The reason for which the payout link was cancelled.
    PayoutLink:
      allOf:
        - $ref: '#/components/schemas/PayoutLinkInitialProps'
        - $ref: '#/components/schemas/PayoutLinkAdditionalProps'
    PayoutLinks:
      type: array
      items:
        $ref: '#/components/schemas/PayoutLink'
      description: A list of payout links
    PayoutLinkAccountId:
      type: string
      format: uuid
      description: The ID of the sender's account.
      example: 85f515e4-588f-4496-a6a5-a7615a193e6b
    PayoutLinkAmount:
      type: number
      format: double
      description: |-
        The amount of money to be transferred.

        :::note
        The amount must be between £1 and £2,500, or equivalent in the selected currency.
        :::
      example: 105.6
    PayoutLinkCounterpartyName:
      type: string
      description: The name of the counterparty provided by the sender.
      example: John Smith
    PayoutLinkExpiryDate:
      type: string
      format: date-time
      description: |-
        The date and time after which the payout link expires in [ISO 8601 format](https://en.wikipedia.org/wiki/ISO_8601).
        If the recipient doesn't claim the money before then, the payout link expires and is no longer available.

        The default and maximum value is the date and time of creating the link + 7 days.
      default: now + 7 days
      maximum: now + 7 days
      minimum: now + 1 day
      example: 2023‐07‐20T15:09:24Z
    PayoutLinkExpiryPeriod:
      type: string
      format: duration
      description: |-
        The period after which the payout link expires if not claimed before, provided in [ISO 8601 format](https://en.wikipedia.org/wiki/ISO_8601).

        The default and maximum value is 7 days from the link creation.
      default: P7D
      maximum: P7D
      minimum: P1D
      example: P3D
    PayoutLinkPayoutMethods:
      type: array
      items:
        $ref: '#/components/schemas/PayoutMethod'
      explode: true
      description: |-
        The list of payout methods that the recipient can use to claim the payout, where:
        - `revolut`: Revolut peer-to-peer (P2P) transfer
        - `bank_account`: External bank transfer
        - `card`: Card transfer
          :::note
          - This payout method is available in the UK and the EEA.
          - This payout method is not available in Sandbox.
          :::
      example:
        - revolut
        - bank_account
        - card
    PayoutLinkReference:
      type: string
      description: The reference for the payout transaction, provided by the sender.
      example: Rent
    PayoutLinkRequestId:
      type: string
      description: The ID of the request, provided by the sender.
      example: 5a7fcb46-4be4-47d4-a56f-27a2e5b78dd1
    PayoutLinkState:
      enum:
        - created
        - failed
        - awaiting
        - active
        - expired
        - cancelled
        - processing
        - processed
      type: string
      description: |-
        The state that the payout link is in. Possible states are:
        - `created`: The payout link has been created, but the amount has not yet been [blocked](https://developer.revolut.com/docs/guides/manage-accounts/transfers/payout-links#sender-link-generation).
        - `failed`: The payout link couldn't be generated due to a failure during transaction booking.
        - `awaiting`: The payout link is awaiting approval.
        - `active`: The payout link can be redeemed.
        - `expired`: The payout link cannot be redeemed because it wasn't claimed before its expiry date.
        - `cancelled`: The payout link cannot be redeemed because it was cancelled.
        - `processing`: The payout link has been redeemed and is being processed.
        - `processed`: The payout link has been redeemed and the money has been transferred to the recipient.
    PayoutMethod:
      type: string
      description: The payout method that the recipient can use to claim the payout.
      enum:
        - revolut
        - bank_account
        - card
    ProfileType:
      type: string
      enum:
        - personal
        - business
      description: |-
        The type of the counterparty.
        Indicates whether the recipient is an individual or a company.
    ResourceCreatedResponse:
      description: Successfully created resource.
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: The ID of the created resource.
    Role:
      type: object
      properties:
        id:
          type: string
          description: The ID of the role. This can be a UUID or other default role such as `OWNER`.
        name:
          type: string
          description: The name of the role.
        created_at:
          type: string
          description: The date and time the role was created in [ISO 8601](https://en.wikipedia.org/wiki/ISO_8601) format.
          format: date-time
        updated_at:
          type: string
          description: The date and time the role was last updated in [ISO 8601](https://en.wikipedia.org/wiki/ISO_8601) format.
          format: date-time
      required:
        - id
        - name
        - created_at
        - updated_at
    SimpleFee:
      type: object
      description: A specific fee component.
      properties:
        amount:
          type: number
          format: double
          description: Fee amount in major units.
        currency:
          $ref: '#/components/schemas/Currency'
      required:
        - amount
        - currency
    SpendProgram:
      description: |-
        The [spend program](https://help.revolut.com/business/help/making-paymentsbusiness/spend-controls/setting-card-presets-for-my-team-members/) assigned to the card.
        :::note
        To use this property, please contact [Revolut API Support](mailto:api-requests@revolut.com).
        :::
      type: object
      readOnly: true
      properties:
        label:
          description: The name of the spend program.
          type: string
          maxLength: 30
      required:
        - label
    SpendingLimitPeriodic:
      type: object
      description: The limit for transactions within a given period.
      properties:
        amount:
          type: number
          format: double
          description: The value of the spending limit.
        currency:
          $ref: '#/components/schemas/TransactionLimitCurrency'
      required:
        - amount
        - currency
    SpendingLimitSingleTransaction:
      type: object
      description: The limit for a single transaction.
      properties:
        amount:
          type: number
          format: double
          description: The value of the spending limit.
        currency:
          $ref: '#/components/schemas/TransactionLimitCurrency'
      required:
        - amount
        - currency
    SpendingLimitsSchema:
      type: object
      properties:
        single:
          description: The limit for a single transaction.
          $ref: '#/components/schemas/SpendingLimitSingleTransaction'
        day:
          description: The daily limit for transactions.
          $ref: '#/components/schemas/SpendingLimitPeriodic'
        week:
          description: The weekly limit for transactions.
          $ref: '#/components/schemas/SpendingLimitPeriodic'
        month:
          description: The monthly limit for transactions.
          $ref: '#/components/schemas/SpendingLimitPeriodic'
        quarter:
          description: The quarterly limit for transactions.
          $ref: '#/components/schemas/SpendingLimitPeriodic'
        year:
          description: The yearly limit for transactions.
          $ref: '#/components/schemas/SpendingLimitPeriodic'
        all_time:
          description: The all-time limit for transactions.
          $ref: '#/components/schemas/SpendingLimitPeriodic'
      example:
        single:
          amount: 200.22
          currency: GBP
        week:
          amount: 200.44
          currency: GBP
    SpendingPeriodSchema:
      type: object
      properties:
        start_date:
          type: string
          format: date
          description: |-
            The start date (inclusive) of the spending period, in [ISO 8601](https://en.wikipedia.org/wiki/ISO_8601) format (`YYYY-MM-DD`).
            Uses the [timezone set by the business](https://business.revolut.com/settings/appearance), or defaults to `Europe/London`.
          example: '2025-09-26'
        end_date:
          type: string
          format: date
          description: |-
            The end date (inclusive) of the spending period, in [ISO 8601](https://en.wikipedia.org/wiki/ISO_8601) format (`YYYY-MM-DD`).
            Uses the [timezone set by the business](https://business.revolut.com/settings/appearance), or defaults to `Europe/London`.
          example: '2030-12-31'
        end_date_action:
          type: string
          enum:
            - lock
            - terminate
          description: The action to take after the end date of the spending period.
      anyOf:
        - required:
            - start_date
        - required:
            - end_date
            - end_date_action
    TaxRate:
      type: object
      description: The [tax rate](https://developer.revolut.com/docs/api/business#delete-tax-rate) applied to the expense split.
      required:
        - id
        - name
      properties:
        id:
          type: string
          format: uuid
          description: The ID of the tax rate.
        name:
          type: string
          description: The name of the tax.
          minLength: 1
          maxLength: 20
        percentage:
          type: number
          format: double
          minimum: 0
          maximum: 100
          description: The tax rate percentage applied to the taxable amount. For example, `23` for 23%.
    TaxRateResponse:
      type: object
      required:
        - id
        - name
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
          description: The unique ID of the tax rate.
          readOnly: true
        name:
          type: string
          description: The name of the tax.
          minLength: 1
          maxLength: 20
        created_at:
          type: string
          format: date-time
          description: The date and time the tax rate was created in [ISO 8601](https://en.wikipedia.org/wiki/ISO_8601) format.
          readOnly: true
        updated_at:
          type: string
          format: date-time
          description: The date and time the tax rate was last updated in [ISO 8601](https://en.wikipedia.org/wiki/ISO_8601) format.
          readOnly: true
        percentage:
          type: number
          format: double
          description: |-
            The tax rate percentage applied to the taxable amount. For example, `23` for 23%.

            :::note
            You cannot create negative tax rates manually. 
            However, negative tax rates might be synced from your accounting software, if integrated. 
            :::
          minimum: -100
          maximum: 100
    TeamMember:
      type: object
      properties:
        id:
          type: string
          description: The ID of the team member.
          format: uuid
        email:
          type: string
          description: The email of the team member.
          format: email
        first_name:
          type: string
          description: The team member's first name.
        last_name:
          type: string
          description: The team member's last name.
        state:
          $ref: '#/components/schemas/TeamMemberState'
        role_id:
          type: string
          description: The ID of the team member's [role](https://developer.revolut.com/docs/api/business#get-roles). This can be a UUID or other default role such as `Owner`.
        created_at:
          type: string
          description: The date and time the team member was created in [ISO 8601](https://en.wikipedia.org/wiki/ISO_8601) format.
          format: date-time
        updated_at:
          type: string
          description: The date and time the team member was last updated in [ISO 8601](https://en.wikipedia.org/wiki/ISO_8601) format.
          format: date-time
      required:
        - id
        - email
        - state
        - role_id
        - created_at
        - updated_at
    TeamMemberState:
      description: The state that the team member is in.
      enum:
        - created
        - confirmed
        - waiting
        - active
        - locked
        - disabled
      type: string
    Transaction:
      type: object
      properties:
        id:
          type: string
          description: The ID of the transaction.
        type:
          $ref: '#/components/schemas/TransactionType'
        request_id:
          type: string
          description: The request ID that you provided previously.
        state:
          $ref: '#/components/schemas/TransactionState'
        reason_code:
          type: string
          description: The reason code when the transaction `state` is `declined` or `failed`.
        created_at:
          type: string
          format: date-time
          description: The date and time the transaction was created in [ISO 8601](https://en.wikipedia.org/wiki/ISO_8601) format.
        updated_at:
          type: string
          format: date-time
          description: The date and time the transaction was last updated in [ISO 8601](https://en.wikipedia.org/wiki/ISO_8601) format.
        completed_at:
          type: string
          format: date-time
          description: |-
            The date and time the transaction was completed in [ISO 8601](https://en.wikipedia.org/wiki/ISO_8601) format. 
            This is required when the transaction `state` is `completed`.
        scheduled_for:
          type: string
          format: date
          description: |-
            The scheduled date of the payment, if applicable.
            Provided in [ISO 8601](https://en.wikipedia.org/wiki/ISO_8601) format.
        related_transaction_id:
          type: string
          format: uuid
          description: |-
            The ID of the original transaction to which this transaction is related. 
            Returned, for example, when this transaction is a refund of the related transaction, or for transactions related to cashback.
        merchant:
          $ref: '#/components/schemas/TransactionMerchant'
        reference:
          type: string
          description: The payment reference.
        legs:
          type: array
          description: |-
            The legs of the transaction:
            - For transactions between your Revolut accounts, there can be 2 legs, for example, an internal transfer made out of the GBP account and into the EUR account.
            - For transactions in other cases, there is only 1 leg.
          items:
            $ref: '#/components/schemas/TransactionLeg'
        card:
          $ref: '#/components/schemas/TransactionCard'
      required:
        - id
        - type
        - state
        - created_at
        - updated_at
        - legs
    Transactions:
      type: array
      items:
        $ref: '#/components/schemas/Transaction'
    TransactionCard:
      type: object
      description: The details of the card associated with the transaction.
      properties:
        id:
          type: string
          format: uuid
          description: The ID of the card.
        card_number:
          type: string
          description: The masked card number.
        first_name:
          type: string
          description: The first name of the cardholder.
        last_name:
          type: string
          description: The last name of the cardholder.
        phone:
          type: string
          description: The phone number of the cardholder in [E.164](https://en.wikipedia.org/wiki/E.164) format.
        references:
          type: array
          description: |-
            Card references ([`references`](https://developer.revolut.com/docs/api/business#get-card#response)).

            :::note
            These are the references that were assigned to the card at the time the transaction was made.
            Any [update](https://developer.revolut.com/docs/api/business#update-card-references) to card references does not affect existing transactions.
            :::
          minItems: 1
          maxItems: 5
          items:
            $ref: '#/components/schemas/CardReference'
          required:
            - id
            - card_number
    TransactionCounterparty:
      type: object
      properties:
        account_id:
          type: string
          format: uuid
          description: The ID of the counterparty account.
        account_type:
          $ref: '#/components/schemas/TransactionCounterpartyAccountType'
        id:
          type: string
          format: uuid
          description: The ID of the counterparty.
      required:
        - account_type
    TransactionCounterpartyAccountType:
      enum:
        - self
        - revolut
        - external
      description: Indicates the type of the account.
      type: string
    TransactionLeg:
      type: object
      description: |-
        The legs of the transaction:
        - For transactions between your Revolut accounts, there can be 2 legs, for example, an internal transfer made out of the BGP account and into the EUR account.
        - For transactions in other cases, there is only 1 leg.
      properties:
        leg_id:
          type: string
          format: uuid
          description: The ID of the leg.
        amount:
          type: number
          format: double
          description: The amount of the transaction.
        fee:
          type: number
          format: double
          description: The amount of the transaction fee.
        currency:
          $ref: '#/components/schemas/Currency'
        bill_amount:
          type: number
          format: double
          description: The billing amount for cross-currency payments.
        bill_currency:
          $ref: '#/components/schemas/Currency'
        account_id:
          type: string
          format: uuid
          description: The ID of the account that the transaction is associated with.
        counterparty:
          $ref: '#/components/schemas/TransactionCounterparty'
        description:
          type: string
          description: The transaction leg purpose.
        balance:
          type: number
          format: double
          description: The total balance of the account that the transaction is associated with.
      required:
        - leg_id
        - amount
        - currency
        - account_id
    TransactionLimitCurrency:
      type: string
      pattern: ^[A-Z]{3}$
      description: The currency of the spending limit, provided as [ISO 4217](https://en.wikipedia.org/wiki/ISO_4217) code in upper case.
    TransactionMerchant:
      type: object
      description: The information about the merchant (only for card transactions).
      properties:
        id:
          type: string
          format: uuid
          description: The ID of the merchant.
        name:
          type: string
          description: The name of the merchant.
        city:
          type: string
          description: The city of the merchant.
        category_code:
          type: string
          description: The category code of the merchant.
        country:
          $ref: '#/components/schemas/CountryCodeMerchant'
    TransactionPaymentRequest:
      type: object
      properties:
        request_id:
          type: string
          description: |-
            A unique identifier for the transaction, provided by you.  
            This is used for idempotency to prevent duplicate payments. 
            There are no strict format requirements, but we recommend using UUID v4 values.

            :::tip[Retrying requests safely with idempotency]
            If you do not receive a response (for example, due to a network error or timeout), you can safely retry the request using the same `request_id`. 

            If a transaction with the same `request_id` was already created, the API will not create a duplicate transaction.

            :::warning[Idempotency expiry]
            Idempotency checks apply only to transactions created **within the last 2 weeks**. 
            Reusing a `request_id` **after this period** may result in a **new transaction being created**.
            :::
          maxLength: 40
        account_id:
          type: string
          format: uuid
          description: The ID of the account that you send the funds from.
        receiver:
          $ref: '#/components/schemas/PaymentReceiver'
        amount:
          type: number
          format: double
          description: The amount to transfer.
        currency:
          $ref: '#/components/schemas/Currency'
        reference:
          type: string
          maxLength: 140
          description: |-
            The reference for the payment.

            - For **BRL**/**KRW**/**VND**/**COP**/**LKR**/**CLP**/**NPR** company transfers, and all **INR** transfers:
                      
              This field must specify the commercial invoice number.

            - For other corridors:

              A piece of text or number you provide to help identify what the payment relates to.
              It can be used, for example, for reconciliation or tracking purposes.

              You might include an invoice number, account or transaction ID, or any other reference meaningful to you.

            If the provided reference is longer than 140 characters, it will be truncated.
            Note that some recipient banks might truncate the reference even further.
        charge_bearer:
          $ref: '#/components/schemas/ChargeBearer'
        transfer_reason_code:
          $ref: '#/components/schemas/TransferReasonCode'
        exchange_reason_code:
          $ref: '#/components/schemas/ExchangeReasonCode'
        fiscal_code:
          type: string
          maxLength: 50
          pattern: ^[a-zA-Z0-9]+$
          description: |-
            Fiscal code of the payer, required for payments to Romanian tax authority beneficiaries (counterparty BIC: `TREZROBUXXX`).

            The business's own tax identification number (TIN) is attached automatically from the business profile.
          example: RO12345678
      required:
        - request_id
        - account_id
        - receiver
        - amount
        - currency
    TransactionState:
      enum:
        - created
        - pending
        - completed
        - declined
        - failed
        - reverted
      description: |-
        Indicates the transaction state. Possible values:
          - `created`: The transaction has been created and is either processed asynchronously or scheduled for a later time.
          - `pending`: The transaction is pending until it's being processed. If the transfer is made between Revolut accounts, this state is skipped and the transaction is executed instantly.
          - `completed`: The transaction was successful.
          - `declined`: The transaction was unsuccessful. This can happen for a variety of reasons, for example, insufficient account balance, wrong receiver information, etc.
          - `failed`: The transaction was unsuccessful. This can happen for a variety of reasons, for example, invalid API calls, blocked payments, etc.
          - `reverted`: The transaction was reverted. This can happen for a variety of reasons, for example, the receiver being inaccessible.
      type: string
    TransactionType:
      enum:
        - atm
        - card_payment
        - card_refund
        - card_chargeback
        - card_credit
        - charge
        - charge_refund
        - exchange
        - transfer
        - loan
        - fee
        - refund
        - topup
        - topup_return
        - tax
        - tax_refund
        - rev_payment
      description: Indicates the transaction type.
      type: string
    TransferReason:
      type: object
      properties:
        country:
          $ref: '#/components/schemas/CountryCode'
        currency:
          $ref: '#/components/schemas/Currency'
        code:
          type: string
          description: Category name of the transfer reason.
          enum:
            - advertising
            - advisor_fees
            - business_insurance
            - construction
            - delivery
            - education
            - family
            - fund_investment
            - goods
            - homesend
            - hotel
            - exports
            - insurance_claims
            - insurance_premium
            - loan_repayment
            - medical
            - office
            - other_fees
            - personal_transfer
            - property_purchase
            - property_rental
            - royalties
            - services
            - share_investment
            - tax
            - transfer
            - transportation
            - travel
            - utilities
        description:
          type: string
          description: The description of the given transfer reason.
      required:
        - country
        - currency
        - code
        - description
    TransferReasons:
      type: array
      items:
        $ref: '#/components/schemas/TransferReason'
    TransferReasonCode:
      type: string
      description: |-
        The reason code for the transaction. Transactions to certain countries and currencies might require you to provide a transfer reason. 
        You can check available reason codes with the [`GET /transfer-reasons` operation](https://developer.revolut.com/docs/api/business#get-transfer-reasons).

        If a transfer reason is not required for the given currency and country, this field is ignored.
      example: property_rental
    TransferRequest:
      type: object
      description: Transfer the funds between accounts of the business in the same currency.
      properties:
        request_id:
          type: string
          description: |-
            The ID of the request, provided by you.
            It helps you identify the transaction in your system.

            :::warning
            To ensure that a transfer is not processed multiple times if there are network or system errors,
            the same `request_id` should be used for requests related to the same transfer.
            :::
          maxLength: 40
        source_account_id:
          type: string
          format: uuid
          description: The ID of the source account that you transfer the funds from.
        target_account_id:
          type: string
          format: uuid
          description: The ID of the target account that you transfer the funds to.
        amount:
          type: number
          format: double
          description: The amount of the funds to be transferred.
        currency:
          $ref: '#/components/schemas/Currency'
        reference:
          type: string
          description: The reference for the funds transfer.
      required:
        - request_id
        - source_account_id
        - target_account_id
        - amount
        - currency
    TransferResponse:
      type: object
      properties:
        id:
          type: string
          description: The ID of the transaction created.
        state:
          $ref: '#/components/schemas/TransactionState'
        created_at:
          type: string
          format: date-time
          description: The date and time the transaction was created in [ISO 8601](https://en.wikipedia.org/wiki/ISO_8601) format.
        completed_at:
          type: string
          format: date-time
          description: The date and time the transaction was completed in [ISO 8601](https://en.wikipedia.org/wiki/ISO_8601) format.
      required:
        - id
        - state
        - created_at
    UpdateAccountingCategoryRequest:
      type: object
      description: The new settings for the accounting category.
      minProperties: 1
      properties:
        name:
          type: string
          description: The new full name for the accounting category.
          minLength: 1
          maxLength: 60
          example: Work From Home equipment
        code:
          type: string
          description: The new code name for the accounting category.
          minLength: 1
          maxLength: 50
          example: WFH
        default_tax_rate_id:
          type: string
          format: uuid
          description: The ID of the new default [tax rate](https://developer.revolut.com/docs/api/business#get-tax-rate) that should be applied to items in this accounting category unless overridden for a specific item.
          example: f93f6c3e-bf95-4b58-bfcd-e642c4fc098e
    UpdateDraftPaymentRequest:
      type: object
      description: The updated details of a single payment in a payment draft.
      minProperties: 1
      properties:
        receiver:
          $ref: '#/components/schemas/PaymentReceiver'
        amount:
          type: number
          format: double
          exclusiveMinimum: true
          minimum: 0
          description: The amount of the payment.
        currency:
          $ref: '#/components/schemas/Currency'
        reference:
          type: string
          minLength: 1
          maxLength: 255
          description: |-
            The reference for the payment.
            A piece of text or number you provide to help identify what the payment relates to.
            It can be used, for example, for reconciliation or tracking purposes.
        charge_bearer:
          type: string
          nullable: true
          description: |-
            The party that should bear the transaction fees related to the selected transaction route if applied.
            Possible options are:
            - `shared`: Also known as **SHA**. The transaction route fees are split between the sender and the recipient.
            - `debtor`: Also known as **OUR**. The sender pays all explicit transaction fees.
          enum:
            - shared
            - debtor
        transfer_reason_code:
          $ref: '#/components/schemas/TransferReasonCode'
    UpdateLabelGroupRequest:
      type: object
      description: The new name for the label group.
      required:
        - name
      properties:
        name:
          description: The new name for the label group.
          type: string
          minLength: 1
          maxLength: 100
    UpdateLabelRequest:
      type: object
      description: The new name for the label.
      required:
        - name
      properties:
        name:
          description: The new name for the label.
          type: string
          minLength: 1
          maxLength: 100
    UpdatePaymentDraftRequest:
      type: object
      description: The updated metadata of a payment draft.
      minProperties: 1
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 255
          nullable: true
          description: The title of the payment draft. To clear the title, provide `null`.
        schedule_for:
          type: string
          format: date
          nullable: true
          description: |-
            The scheduled date of the payment draft in [ISO 8601](https://en.wikipedia.org/wiki/ISO_8601) format.

            :::note
            The date must be in the future.
            :::

            To clear the scheduled date, provide `null`.
    UpdateTaxRateRequest:
      type: object
      description: The new setting for the tax rate.
      minProperties: 1
      properties:
        name:
          description: The new name for the tax rate.
          type: string
          minLength: 1
          maxLength: 20
    UpdateWebhookRequest:
      type: object
      properties:
        url:
          $ref: '#/components/schemas/Url'
          description: A valid webhook URL to which to send event notifications. The supported protocol is `https`.
        events:
          description: A list of event types to subscribe to.
          type: array
          items:
            $ref: '#/components/schemas/WebhookEventType'
    Url:
      description: A valid webhook URL to which to send event notifications. The supported protocol is `https`.
      type: string
      format: uri
    ValidateAccountNameRequest:
      discriminator:
        mapping:
          UK: '#/components/schemas/ValidateAccountNameRequestUK'
          AU: '#/components/schemas/ValidateAccountNameRequestAU'
          RO: '#/components/schemas/ValidateAccountNameRequestRO'
          EUR: '#/components/schemas/ValidateAccountNameRequestEUR'
    ValidateAccountNameRequestUK:
      title: UK
      type: object
      properties:
        account_no:
          type: string
          description: The account number of the counterparty.
        sort_code:
          type: string
          description: The sort code of the counterparty's account.
        company_name:
          type: string
          description: |
            The name of the business counterparty.

            **Required** when the account type is business (`individual_name` is not specified).
        individual_name:
          type: object
          description: |
            The name of the individual counterparty, split into first name and last name.

            **Required** when the account type is personal (`company_name` isn't specified).
          required:
            - first_name
            - last_name
          properties:
            first_name:
              type: string
              description: The first name of the recipient.
            last_name:
              type: string
              description: The last name of the recipient.
      required:
        - account_no
        - sort_code
    ValidateAccountNameRequestAU:
      title: AU
      type: object
      properties:
        account_no:
          type: string
          description: The account number of the counterparty.
        bsb:
          type: string
          description: |-
            The BSB (Bank-State-Branch) number for the counterparty's account.
            Used to identify the bank and branch in Australia.
        company_name:
          type: string
          description: |
            The name of the business counterparty.

            **Required** when the account type is business (`individual_name` is not specified).
        individual_name:
          type: object
          description: |
            The name of the individual counterparty, split into first name and last name.

            **Required** when the account type is personal (`company_name` isn't specified).
          required:
            - first_name
            - last_name
          properties:
            first_name:
              type: string
              description: The first name of the recipient.
            last_name:
              type: string
              description: The last name of the recipient.
      required:
        - account_no
        - bsb
    ValidateAccountNameRequestRO:
      title: RO
      type: object
      properties:
        iban:
          type: string
          description: The IBAN (International Bank Account Number) for the counterparty's account.
        bic:
          type: string
          description: |-
            The BIC (Bank Identifier Code) for the counterparty's account.
            Also known as the SWIFT code.
            This value is optional. 
            It can be provided, for example, when the automatic BIC detection fails and the check is unsuccessful.
        recipient_country:
          type: string
          pattern: ^[A-Z]{2}$
          description: |-
            The counterparty's bank country, provided as a 2-letter [ISO 3166](https://en.wikipedia.org/wiki/List_of_ISO_3166_country_codes) code.

            For RO CoP, the **possible value** is `RO`.
          example: RO
        recipient_currency:
          type: string
          pattern: ^[A-Z]{3}$
          description: |
            The counterparty account’s currency, provided as a 3-letter [ISO 4217](https://en.wikipedia.org/wiki/ISO_4217) code.

            For RO CoP, the **possible value** is `RON`.
          example: RON
        company_name:
          type: string
          description: |
            The name of the business counterparty.

            **Required** when the account type is business (`individual_name` is not specified).

            ⓘ Note that for [RO](https://developer.revolut.com/docs/guides/manage-accounts/counterparties/confirmation-of-payee#supported-regions-and-services), the name you provide helps identify the request, but is **not** used for the actual check.
            The API simply returns the partially masked name associated with the IBAN for you to validate.
            Therefore, the returned name may differ from the one you provide.
        individual_name:
          type: object
          description: |
            The name of the individual counterparty, split into first name and last name.

            **Required** when the account type is personal (`company_name` isn't specified).

            ⓘ Note that for [RO](https://developer.revolut.com/docs/guides/manage-accounts/counterparties/confirmation-of-payee#supported-regions-and-services), the name you provide helps identify the request, but is **not** used for the actual check.
            The API simply returns the partially masked name associated with the IBAN for you to validate.
            Therefore, the returned name may differ from the one you provide.
          required:
            - first_name
            - last_name
          properties:
            first_name:
              type: string
              description: The first name of the recipient.
            last_name:
              type: string
              description: The last name of the recipient.
      required:
        - iban
        - recipient_country
        - recipient_currency
    ValidateAccountNameRequestEUR:
      title: EUR
      type: object
      properties:
        iban:
          type: string
          description: The IBAN (International Bank Account Number) for the counterparty's account.
        bic:
          type: string
          description: |-
            The BIC (Bank Identifier Code) for the counterparty's account.
            Also known as the SWIFT code.
            It can be provided, for example, when the automatic BIC detection fails and the check is unsuccessful.
        recipient_country:
          type: string
          pattern: ^[A-Z]{2}$
          description: The counterparty's bank country, provided as a 2-letter [ISO 3166](https://en.wikipedia.org/wiki/List_of_ISO_3166_country_codes) code.
          example: FR
        recipient_currency:
          type: string
          pattern: ^[A-Z]{3}$
          description: |
            The counterparty account’s currency, provided as a 3-letter [ISO 4217](https://en.wikipedia.org/wiki/ISO_4217) code.

            For VoP, the **possible value** is `EUR`.
          example: EUR
        company_name:
          type: string
          description: |
            The name of the business counterparty.

            **Required** when the account type is business (`individual_name` is not specified).
        individual_name:
          type: object
          description: |
            The name of the individual counterparty, split into first name and last name.

            **Required** when the account type is personal (`company_name` isn't specified).
          required:
            - first_name
            - last_name
          properties:
            first_name:
              type: string
              description: The first name of the recipient.
            last_name:
              type: string
              description: The last name of the recipient.
      required:
        - iban
        - recipient_country
        - recipient_currency
    ValidateAccountNameResponse:
      discriminator:
        mapping:
          UK: '#/components/schemas/ValidateAccountNameResponseUK'
          AU: '#/components/schemas/ValidateAccountNameResponseAU'
          RO: '#/components/schemas/ValidateAccountNameResponseRO'
          EUR: '#/components/schemas/ValidateAccountNameResponseEUR'
    ValidateAccountNameResponseUK:
      title: UK
      type: object
      properties:
        result_code:
          description: |-
            The result of the check. 

            Possible values for UK:
            - **`matched`:** The name and account type match the provided details.
            - **`close_match`:** The name and/or account type are similar to the provided values:
              - The name is a match, but the account type is incorrect.
                For example, an individual recipient's name was provided under `company_name`.
                The **actual account type** is returned.
              - The name is similar to the provided values.
                Account type is correct.
                The **actual name** is returned.
              - The name is similar to the provided values, and the account type is incorrect.
                The **actual values** are returned.

              The actual values are returned.
            - **`not_matched`:** The name and account type don't match the provided values.
            - **`cannot_be_checked`:** The check cannot be performed and retries won't help.
              For example, the recipient's bank doesn't support CoP.
            - **`temporarily_unavailable`:** The check cannot be performed right now.
              For example, the recipient's bank didn't respond to our request.
              You should retry the request later.
          type: string
          enum:
            - matched
            - close_match
            - not_matched
            - cannot_be_checked
            - temporarily_unavailable
        reason:
          $ref: '#/components/schemas/AccountNameValidationReasonUK'
        company_name:
          type: string
          description: |-
            The name of the recipient when the account type is business.
            Provided only if `individual_name` is not specified.

            When the name is a close match, the actual full name is returned, otherwise, the name you provided is returned.
        individual_name:
          type: object
          required:
            - first_name
            - last_name
          description: |-
            The name of the recipient when the account type is personal.
            Provided only if `company_name` is not specified.

            When the name is a close match, the actual first and last names are returned in full.
          properties:
            first_name:
              type: string
              description: The first name of the recipient.
            last_name:
              type: string
              description: The last name of the recipient.
      required:
        - result_code
    ValidateAccountNameResponseAU:
      title: AU
      type: object
      properties:
        result_code:
          description: |-
            The result of the check. 

            Possible values for AU:
            - **`matched`:** The name matches the provided details.
              For personal accounts, this also covers **close matches**, in which case the **actual name** is returned.
            - **`close_match` (business account):** The name is similar to the provided value.
            - **`not_matched`:** The name doesn't match the provided values.
            - **`cannot_be_checked`:** The check cannot be performed and retries won't help.
              For example, the recipient's bank doesn't support CoP.
            - **`temporarily_unavailable`:** The check cannot be performed right now.
              For example, the recipient's bank didn't respond to our request.
              You should retry the request later.
          type: string
          enum:
            - matched
            - close_match
            - not_matched
            - cannot_be_checked
            - temporarily_unavailable
        reason:
          $ref: '#/components/schemas/AccountNameValidationReasonAU'
        company_name:
          type: string
          description: |-
            The name of the recipient when the account type is business.
            Provided only if `individual_name` is not specified.

            When the name is a close match, the actual full name is returned.
            Otherwise, the name you provided is returned.

            :::tip[Mismatched name type is corrected]
            The mismatched name type in the request is corrected in the response.
            This means that, for example, if an individual recipient's name was provided under `company_name`, in the response it is returned under `individual_name`.
            :::
        individual_name:
          type: object
          required:
            - first_name
            - last_name
          description: |-
            The name of the recipient when the account type is personal.
            Provided only if `company_name` is not specified.

            When the name is a close match, the actual first and last names are returned.
            Otherwise, the name you provided is returned.

            :::tip[Mismatched name type is corrected]
            The mismatched name type in the request is corrected in the response.
            This means that, for example, if an individual recipient's name was provided under `company_name`, in the response it is returned under `individual_name`.
            :::
          properties:
            first_name:
              type: string
              description: The first name of the recipient.
            last_name:
              type: string
              description: The last name of the recipient.
      required:
        - result_code
    ValidateAccountNameResponseRO:
      title: RO
      type: object
      properties:
        result_code:
          description: |-
            The result of the check. 

            For RO CoP, the API **checks if an account exists for the provided IBAN**.
            Possible results are:
            - **`matched`:** An account with the provided IBAN was found.
              When this status is returned, the API also returns a partial name of the account holder.
              Use this returned name to validate your recipient's details.
            - **`cannot_be_checked`:** The check cannot be performed and retries won't help.
                For example, the recipient's bank doesn't support CoP.
            - **`temporarily_unavailable`:** The check cannot be performed right now.
              For example, the recipient's bank didn't respond to our request.
              You should retry the request later.
          type: string
          enum:
            - matched
            - close_match
            - not_matched
            - cannot_be_checked
            - temporarily_unavailable
        reason:
          $ref: '#/components/schemas/AccountNameValidationReasonRO'
        company_name:
          type: string
          description: |-
            The **partially masked** name of the recipient when the account type is business.
            Provided only if `individual_name` is not specified.

            :::warning[Name considerations]
            - The name you provide helps identify the request, but is not used for the actual check.
              The API simply returns the partial name associated with the IBAN for you to validate.
              Therefore, the **returned name may differ** from the one you provided.
            - **Mismatched name type is not corrected**.
              This means that the name type in the response is returned as it was provided in the request.
              For example, if an individual recipient's name was provided under `company_name`, in the response it's still returned under `company_name` (instead of `individual_name`).
            :::
          example: Rodri**** SA
        individual_name:
          type: object
          required:
            - first_name
            - last_name
          description: |-
            The partial name of the recipient when the account type is personal, that is, the first name and the last name's initial.
            Provided only if `company_name` is not specified.

            :::warning[Name considerations]
            - The name you provide helps identify the request, but is not used for the actual check.
              The API simply returns the partial name associated with the IBAN for you to validate.
              Therefore, the **returned name may differ** from the one you provided.
            - **Mismatched name type is not corrected**.
              This means that the name type in the response is returned as it was provided in the request.
              For example, if an individual recipient's name was provided under `company_name`, in the response it's still returned under `company_name` (instead of `individual_name`).
            :::
          properties:
            first_name:
              type: string
              description: The first name of the recipient.
              example: Alexandru
            last_name:
              type: string
              description: The initial of the last name of the recipient.
              example: I.
      required:
        - result_code
    ValidateAccountNameResponseEUR:
      title: EUR
      type: object
      properties:
        result_code:
          description: |-
            The result of the check. 

            Possible values for EUR:
            - **`matched`:** The name matches the provided details.
            - **`close_match`:** The recipient's name is similar to the provided value.
              The **actual name** is returned.
            - **`not_matched`:** The name and account type don't match the provided values.
              The **name provided in the request** is returned.
            - **`cannot_be_checked`:** The check cannot be performed and retries won't help.
              For example, the recipient's bank doesn't support VoP.
            - **`temporarily_unavailable`:** The check cannot be performed right now.
              For example, the recipient's bank didn't respond to our request.
              You should retry the request later.
          type: string
          enum:
            - matched
            - close_match
            - not_matched
            - cannot_be_checked
            - temporarily_unavailable
        reason:
          $ref: '#/components/schemas/AccountNameValidationReasonEUR'
        company_name:
          type: string
          description: |-
            The name of the recipient when the account type is business.
            Provided only if `individual_name` is not specified.

            When the name is a close match, the actual name is returned.
            Otherwise, the name you provided is returned.

            :::warning[Mismatched name type is not corrected]
            The name type in the response is returned as it was provided in the request.
            For example, if an individual recipient's name was provided under `company_name`, in the response it's still returned under `company_name` (instead of `individual_name`).
            :::
        individual_name:
          type: object
          required:
            - first_name
            - last_name
          description: |-
            The name of the recipient when the account type is personal.
            Provided only if `company_name` is not specified.

            When the name is a close match, the actual name is returned.
            Otherwise, the name you provided is returned.

            :::warning[Mismatched name type is not corrected]
            The name type in the response is returned as it was provided in the request.
            For example, if an individual recipient's name was provided under `company_name`, in the response it's still returned under `company_name` (instead of `individual_name`).
            :::
          properties:
            first_name:
              type: string
              description: The first name of the recipient.
            last_name:
              type: string
              description: The last name of the recipient.
      required:
        - result_code
    Webhook-v1:
      type: object
      properties:
        url:
          type: string
          format: uri
          description: The valid webhook URL that event notifications are sent to. The supported protocol is `https`.
      required:
        - url
    Webhook-v2-basic:
      type: object
      required:
        - id
        - url
        - events
      properties:
        id:
          type: string
          format: uuid
          description: The ID of the webhook.
        url:
          type: string
          format: uri
          description: The valid webhook URL that event notifications are sent to. The supported protocol is `https`.
        events:
          type: array
          items:
            $ref: '#/components/schemas/WebhookEventType'
          description: The list of event types that you are subscribed to.
      example:
        id: 6fc346be-5cb5-4c14-aadc-e8aba6a655d7
        url: https://www.example.com/
        events:
          - TransactionCreated
    Webhook-v2:
      type: object
      required:
        - id
        - url
        - events
        - signing_secret
      properties:
        id:
          type: string
          format: uuid
          description: The ID of the webhook.
        url:
          type: string
          format: uri
          description: The valid webhook URL that event notifications are sent to. The supported protocol is `https`.
        events:
          type: array
          items:
            $ref: '#/components/schemas/WebhookEventType'
          description: The list of event types that you are subscribed to.
        signing_secret:
          type: string
          description: The signing secret for the webhook.
      example:
        id: 6fc346be-5cb5-4c14-aadc-e8aba6a655d7
        url: https://www.example.com/
        events:
          - TransactionCreated
        signing_secret: wsk_4jETWMz1g1b37gCONjNp84t2KSSIT7dK
    Webhooks:
      type: array
      items:
        $ref: '#/components/schemas/Webhook-v2-basic'
    WebhookEvent:
      type: object
      required:
        - id
        - created_at
        - updated_at
        - webhook_id
        - webhook_url
        - payload
      description: A webhook event
      properties:
        id:
          type: string
          format: uuid
          description: The ID of the webhook event.
        created_at:
          type: string
          format: date-time
          description: The date and time the event was created in [ISO 8601](https://en.wikipedia.org/wiki/ISO_8601) format.
        updated_at:
          type: string
          format: date-time
          description: The date and time the event was last updated in [ISO 8601](https://en.wikipedia.org/wiki/ISO_8601) format.
        webhook_id:
          type: string
          format: uuid
          description: The ID of the webhook for which the event failed.
        webhook_url:
          type: string
          format: uri
          description: The valid webhook URL that event notifications are sent to. The supported protocol is `https`.
        payload:
          type: object
          description: The details of the failed event.
        last_sent_date:
          type: string
          format: date-time
          description: The date and time the last attempt at the event delivery occurred in [ISO 8601](https://en.wikipedia.org/wiki/ISO_8601) format.
    WebhookEvents:
      type: array
      items:
        $ref: '#/components/schemas/WebhookEvent'
    WebhookEventType:
      enum:
        - TransactionCreated
        - TransactionStateChanged
        - PayoutLinkCreated
        - PayoutLinkStateChanged
      description: The type of the webhook event to subscribe to.
    WebhookSigningSecretRotateRequest:
      type: object
      properties:
        expiration_period:
          type: string
          format: duration
          description: The expiration period for the signing secret in [ISO 8601 format](https://en.wikipedia.org/wiki/ISO_8601#Durations). If set, when you rotate the secret, it continues to be valid until the expiration period has passed. Otherwise, on rotation, the secret is invalidated immediately. The maximum value is 7 days.
          maximum: P7D
          example: PT5H30M
          default: P0D
  parameters:
    PageToken:
      in: query
      name: page_token
      required: false
      schema:
        $ref: '#/components/schemas/PageToken'
  responses:
    Unauthorized:
      description: |-
        Unauthorized – authentication credentials are missing or invalid

        Returned when the request was not fulfilled because authentication has failed or has not been provided.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorWithId'
          examples:
            access_token_invalid_or_expired:
              summary: Access token invalid or expired
              value:
                error_id: 9d66499d-3fc5-45e9-92f6-3ddcad4793c6
                code: 1000
                message: Access token is invalid or has expired. Please refresh your access token or generate a new one following the 'Get a new access token' guide in the Revolut API docs.
            invalid_token:
              summary: Invalid token
              value:
                error_id: 7835beae-98ed-42dc-b993-95f4ded951a1
                code: 1000
                message: Invalid token. The authorization header must follow the 'Bearer <token>' format.
    Forbidden:
      description: |-
        Action forbidden - insufficient permissions to perform this action

        Returned, for example, when you don't have permissions necessary to perform this action.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorWithId'
          example:
            error_id: c5deadcc-1934-4438-818a-3c7ca1e6c01c
            code: 9002
            message: This action is forbidden
    TooManyRequests:
      description: |-
        Too many requests

        Returned, for example, when the rate limit has been exceeded.
        If the response includes the `Retry-After` instruction, please respect it and refrain from earlier retry attempts.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorWithId'
          examples:
            rateLimitExceededNoRetryAfter:
              summary: Rate limit exceeded (no Retry-After)
              value:
                error_id: 06153eec-c5cd-4db8-8898-7ae96b9d89ab
                code: 3162
                message: Request rate limit has been reached. Try again later.
            rateLimitExceededWithRetryAfter:
              summary: Rate limit exceeded (with Retry-After)
              value:
                error_id: 06153eec-c5cd-4db8-8898-7ae96b9d89ab
                code: 3162
                message: Request rate limit has been reached. Try again after 30 seconds.
    InternalServerError:
      description: |-
        Internal server error

        An unexpected application error occurred.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorWithId'
          example:
            error_id: 7f96652e-7518-4229-872b-4e4c867fb4da
            code: 5000
            message: An unexpected error occurred while processing your request. If the issue persists, please contact support
    ServiceUnavailable:
      description: |-
        Service Unavailable

        The system is temporarily unavailable.
        If the response includes the `Retry-After` header instruction, please respect it and refrain from earlier retry attempts.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorWithId'
          examples:
            service_unavailable:
              summary: System temporarily unavailable
              value:
                error_id: 201768bc-c5cd-4db8-8898-7ae96b9d89ab
                code: 5003
                message: The service is temporarily unavailable. Try again in a few moments. If the issue persists, please contact support
    ResourceCreatedResponse:
      description: |-
        Resource created

        On successful creation, the response returns only the ID of the new resource, even if the resource has more properties.
        To get all details, use the returned resource ID with a GET request.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ResourceCreatedResponse'
          examples:
            resource_created:
              summary: Resource created
              value:
                id: 6a37383e-cfd3-4a2f-aa81-e3a6e6939efa
