        - AccessToken:
            - READ
      parameters:
        - name: limit
          in: query
          required: false
          description: |-
            The page size, that is, the maximum number of tax rates to return per page.

            To get the next page of results, use `page_token`.
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 100
            example: 10
        - $ref: '#/components/parameters/PageToken'
      responses:
