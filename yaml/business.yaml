  /counterparties/fields:
    get:
      summary: Check counterparty field requirements
      operationId: getCounterpartyRequirements
      description: |-
        Retrieve the list of conditionally required or applicable fields for creating a counterparty together with their constraints.

        :::note [Note]
        This feature is not available in Sandbox.
        :::

        When creating a counterparty via the [Create a counterparty endpoint](https://developer.revolut.com/docs/api/business#add-counterparty), certain fields (such as `first_name`, `last_name`, `company_name`, `tax_id`, `route`, or `account_type`) become required depending on the counterparty's bank country, currency, and profile type.
        This read-only endpoint allows you to discover these contextual fields dynamically, along with their validation rules and available options.

        Only the fields relevant to the specific context are returned.
        The input parameters (`country`, `currency`, and `recipient_type`) are intentionally excluded from the response.

        For more details, see the guide: **Check counterparty field requirements** section in [Create a counterparty](https://developer.revolut.com/docs/guides/manage-accounts/counterparties/create-a-counterparty#check-counterparty-field-requirements).
      security:
        - AccessToken:
            - READ
      parameters:
        - name: country
          in: query
          required: true
          description: The country where the counterparty's bank account is located.
          schema:
            $ref: '#/components/schemas/BankCountryCode'
        - name: currency
          in: query
          required: true
          description: The currency of the counterparty's bank account.
          schema:
            $ref: '#/components/schemas/Currency'
        - name: recipient_type
          in: query
          required: true
          description: |-
            The type of the counterparty profile.
            Indicates whether the counterparty is a personal or business account.
          schema:
            type: string
            enum:
              - personal
              - business
        - name: route
          in: query
          required: false
          description: |-
            The routing method for the corridor. 
            When omitted, the response includes fields for the default route.
            For example, for USD to US, the default is `ach`.
          schema:
            type: string
      responses:
        '200':
          description: The applicable and conditionally required fields for creating the counterparty
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CounterpartyRequirementsResponse'
              examples:
                gb_counterparty:
                  summary: GB personal counterparty
                  value:
                    fields:
                      - name: first_name
                        required: true
                        regex:
                          pattern: ^[-'\p{L} ]{1,40}$
                          description: Letters, hyphens and apostrophes only, up to 40 characters
                      - name: last_name
                        required: true
                        regex:
                          pattern: ^[-'\p{L} ]{1,40}$
                          description: Letters, hyphens and apostrophes only, up to 40 characters
                      - name: sort_code
                        required: true
                        regex:
                          pattern: ^\d{6}$
                          description: 6-digit number
                      - name: account_no
                        required: true
                        regex:
                          pattern: ^\d{8}$
                          description: 8-digit number
                      - name: address
                        required: true
                us_counterparty:
                  summary: US business counterparty
                  value:
                    fields:
                      - name: company_name
                        required: true
                        regex:
                          pattern: ^.{1,140}$
                          description: Up to 140 characters
                      - name: route
                        required: true
                        options:
                          - value: ach
                            default: true
                          - value: fedwire
                      - name: routing_number
                        required: true
                        regex:
                          pattern: ^\d{9}$
                          description: 9-digit number
                      - name: account_no
                        required: true
                        regex:
                          pattern: ^\d{6,17}$
                          description: 6 to 17 digits
                      - name: address
                        required: true
        '400':
          description: |-
            Bad request

            For example:
            - missing or invalid query parameters
            - unsupported recipient type for country/currency combination
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorWithId'
              examples:
                invalid_request:
                  summary: Invalid request
                  value:
                    error_id: 40626b34-365b-43d0-b148-04dcbaeaf4df
                    code: 2101
                    message: Invalid request (missing or invalid query parameters)
                unsupported_recipient:
                  summary: Unsupported recipient type
                  value:
                    error_id: 015c2e86-30a5-404b-aa25-b68c25d97e69
                    code: 3081
                    message: Recipient type is not supported for the given country and currency
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorWithId'
              examples:
                not_found:
                  summary: Resource not found
                  value:
                    error_id: a29241ce-1f37-4ffb-8249-d09faec81aed
                    code: 3006
                    message: Resource not found
        '422':
          description: |-
            Unprocessable entity

            For example:
            - currency not supported for the given country
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorWithId'
              examples:
                unsupported_currency:
                  summary: Unsupported currency
                  value:
                    error_id: 2cd5330c-c4a9-45ce-88d3-8cbdaeba887c
                    code: 4030
                    message: Currency for country is not supported
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorWithId'
      tags:
        - Counterparties
