      items:
        $ref: '#/components/schemas/BusinessMerchantCategory'
    CardCanBeUnlocked:
      type: boolean
      description: |-
        Returned for locked cards (`state=locked`).
        Indicates whether the card can be [unlocked](https://developer.revolut.com/docs/api/business#unlock-card) manually (via API or in-app).
        If `true`, you'll still need the [necessary scope or permission](https://developer.revolut.com/docs/guides/manage-accounts/cards/manage-cards#lock-or-unlock-cards) to unlock the card.

        :::info
        Cards can be locked for various reasons.
        For example, a card can be locked by the user, due to spending period settings, or automatically by the system.
        Only certain types of lock can be lifted manually.
        :::
    CardContact:
      description: One of the card's contacts.
      type: string
      format: uuid
    CardContacts:
      description: The list of contacts for a [company card](https://developer.revolut.com/docs/guides/manage-accounts/cards/manage-cards#different-types-of-cards).
      type: array
      minItems: 1
      maxItems: 5
      uniqueItems: true
      items:
        $ref: '#/components/schemas/CardContact'
    CardCountries:
      description: The list of countries where the card can be used, specified as 2-letter [ISO 3166](https://en.wikipedia.org/wiki/List_of_ISO_3166_country_codes) codes.
      type: array
      items:
        type: string
        pattern: ^[A-Z]{2}$
        example: GB
    CardCreatedAt:
      type: string
      description: The date and time the card was created in [ISO 8601](https://en.wikipedia.org/wiki/ISO_8601) format.
      format: date-time
    CardExpiry:
      type: string
      format: DD/YYYY
      description: The card expiration date.
      pattern: ^[0-9]{2}/[0-9]{4}$
    CardHolderId:
      type: string
      description: |-
        The ID of the team member who is the holder of the card.
        If the card belongs to the business, this will be empty.

        For more information, see the guides: [Manage Cards - Create a virtual card](https://developer.revolut.com/docs/guides/manage-accounts/cards/manage-cards#create-a-virtual-card).
      format: uuid
    CardId:
      type: string
      description: The ID of the card.
      format: uuid
    CardLabel:
      type: string
      description: The label of the card.
    CardLastDigits:
      type: string
      description: The last 4 digits of the card's PAN.
      pattern: ^[0-9]{4}$
    CardMerchantControls:
      description: |-
        The merchant-level controls for card spending.

        They block or allow the card to only transact with specific merchants: 
        - `allow`: permits only the specified merchants (cannot be used if the `categories` parameter is set)
        - `block`: blocks the specified merchants (can be used with or without `categories`)
      type: object
      allOf:
        - $ref: '#/components/schemas/MerchantControlsSchema'
    CardProduct:
      description: |-
        The card product offered by the card provider for this card.
        In other words, the program that the card was issued under.

        :::note
        This property is only available to travel intermediaries using our travel solution.
        To use it, please contact [Revolut API Support](mailto:api-requests@revolut.com).
        :::
      type: object
      properties:
        code:
          type: string
          description: The code of the card product.
      required:
        - code
    CardReference:
      description: |-
        Reference for the card.
        One of the name-value pairs assigned to the card for tracking.

        :::info
        Each time the card is used, the references are recorded in the [transaction details](https://developer.revolut.com/docs/api/business#get-transaction#response) (`card.references`), helping track transactions made with this card.
        :::

        The names must be unique.
        The references can be [amended](https://developer.revolut.com/docs/api/business#update-card-references) up to 10 times.
        References are only supported for cards owned by the business (i.e. [company](https://developer.revolut.com/docs/guides/manage-accounts/cards/manage-cards#different-types-of-cards) or [auto-issued cards](https://developer.revolut.com/docs/guides/manage-accounts/cards/manage-cards#different-types-of-cards)).
        They are **not** supported for [team member cards](https://developer.revolut.com/docs/guides/manage-accounts/cards/manage-cards#different-types-of-cards) (i.e. with `holder_id` present). 

        :::note
        The references recorded on a transaction are those assigned to the card at the time the transaction took place.
        If the references are amended, the new references are only applied to future transactions.
        Existing transaction are not affected.
        :::
      type: object
      required:
        - name
        - value
      properties:
        name:
          description: |-
            The name of the card reference.
            Must be unique.
          type: string
          minLength: 1
          maxLength: 30
        value:
          description: The value for this reference.
          type: string
          minLength: 1
          maxLength: 30
      example:
        name: PNR
        value: RT12345
    CardReferences:
      description: |-
        References for the card.
        Up to 5 name-value pairs assigned to the card for tracking.

        :::info
        Each time the card is used, the references are recorded in the [transaction details](https://developer.revolut.com/docs/api/business#get-transaction#response) (`card.references`), helping track transactions made with this card.
        :::

        The names must be unique.
        The references can be [amended](https://developer.revolut.com/docs/api/business#update-card-references) up to 10 times.

        References are only supported for cards owned by the business (i.e. [company](https://developer.revolut.com/docs/guides/manage-accounts/cards/manage-cards#different-types-of-cards) or [auto-issued cards](https://developer.revolut.com/docs/guides/manage-accounts/cards/manage-cards#different-types-of-cards)).
        They are **not** supported for [team member cards](https://developer.revolut.com/docs/guides/manage-accounts/cards/manage-cards#different-types-of-cards) (i.e. with `holder_id` present).

        :::note
        The references recorded on a transaction are those assigned to the card at the time the transaction took place.
        If the references are amended, they will only be applied to future transactions.
        Existing transaction are not affected.
        :::
      type: array
      minItems: 1
      maxItems: 5
      uniqueItems: true
      items:
        $ref: '#/components/schemas/CardReference'
      example:
        - name: PNR
          value: RT12345
        - name: Traveller
          value: John Smith
    CardSpendingPeriod:
      description: |-
        The controls for the card's spending period.

        They specify the dates when the card becomes available or unavailable for spending, and define what happens after the end date.
      type: object
      allOf:
        - $ref: '#/components/schemas/SpendingPeriodSchema'
    CardState:
      enum:
        - created
        - pending
        - active
        - frozen
        - locked
      description: |-
        The state that the card is in.

        Possible values:
        - `active`: The card is available for spending. 
          Newly created cards typically go into `active` unless subject to certain conditions, for example, spending period starting in the future.
        - `frozen`: The card has been frozen and is temporarily unavailable for spending. 
        - `locked`: The card is locked, typically due to an [admin lock](https://developer.revolut.com/docs/api/business#lock-card) or spending period settings, i.e. when its `spending_period.start_date` is in the future or `spending_period.end_date` is in the past.
          A locked card is unavailable for spending until it's [unlocked](https://developer.revolut.com/docs/api/business#unlock-card) and active.
          :::tip
          To see if the card can be unlocked, check the `can_be_unlocked` parameter.
          Note that you'll still need the [necessary scope or permission](https://developer.revolut.com/docs/guides/manage-accounts/cards/manage-cards#lock-or-unlock-cards) to unlock it.
          :::
        - `created`: The card has been created but is not yet active.
          Used only for a specific type of cards.
        - `pending`: This status is currently not in use.
      type: string
    CardStateWithTerminated:
      enum:
        - created
        - pending
        - active
        - frozen
        - locked
        - terminated
      description: |-
        The state that the card is in.

        Possible values:
        - `active`: The card is available for spending. 
          Newly created cards typically go into `active` unless subject to certain conditions, for example, spending period starting in the future.
        - `frozen`: The card has been frozen and is temporarily unavailable for spending. 
        - `locked`: The card is locked, typically due to an [admin lock](https://developer.revolut.com/docs/api/business#lock-card) or spending period settings, i.e. when its `spending_period.start_date` is in the future or `spending_period.end_date` is in the past.
          A locked card is unavailable for spending until it's [unlocked](https://developer.revolut.com/docs/api/business#unlock-card) and active.
          :::tip
          To see if the card can be unlocked, check the `can_be_unlocked` parameter.
          Note that you'll still need the [necessary scope or permission](https://developer.revolut.com/docs/guides/manage-accounts/cards/manage-cards#lock-or-unlock-cards) to unlock it.
          :::
        - `created`: The card has been created but is not yet active.
          Used only for a specific type of cards.
        - `pending`: This status is currently not in use.
        - `terminated`: The card is terminated and cannot be used. This is a final state and cannot be reversed.
      type: string
    CardUpdatedAt:
      type: string
      description: The date and time the card was last updated in [ISO 8601](https://en.wikipedia.org/wiki/ISO_8601) format.
      format: date-time
    CardVirtual:
      type: boolean
      description: Specifies whether the card is virtual (`true`) or physical (`false`).
    Category:
      type: object
      description: The [accounting category](https://developer.revolut.com/docs/api/business#delete-accounting-category) of the expense split.
      required:
        - id
        - name
      properties:
        id:
          type: string
          format: uuid
          description: The ID of the accounting category.
        name:
          type: string
          description: The name of the accounting category.
        code:
          type: string
          description: The code of the accounting category.
    ChargeBearer:
      type: string
      enum:
        - shared
        - debtor
      description: |-
        The party to which any transaction fees are charged if the resulting transaction route has associated fees: 
        - `shared`: Also known as **SHA**. The transaction route fees are split between the sender and the recipient. 
          The sender pays the fees charged by their bank, while the recipient pays the fees charged by the receiving and any intermediary banks.
        - `debtor`: Also known as **OUR**. The sender pays all explicit transaction fees.
        Some transactions with fees might not be possible with the specified option, in which case error `3287` is returned.
    Counterparty:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: The ID of the counterparty.
        name:
          type: string
          description: The name of the counterparty.
        revtag:
          type: string
          description: The [Revtag](https://help.revolut.com/help/transfers/internal-transfers/username-payments/revtags/) of the counterparty.
        profile_type:
          $ref: '#/components/schemas/ProfileType'
        country:
          $ref: '#/components/schemas/CountryCode'
        state:
          enum:
            - created
            - draft
            - deleted
          description: Indicates the state of the counterparty.
          type: string
        created_at:
          type: string
          format: date-time
          description: The date and time the counterparty was created in [ISO 8601](https://en.wikipedia.org/wiki/ISO_8601) format.
        updated_at:
          type: string
          format: date-time
          description: The date and time the counterparty was last updated in [ISO 8601](https://en.wikipedia.org/wiki/ISO_8601) format.
        accounts:
          type: array
          description: The list of public accounts associated with this counterparty.
          items:
            $ref: '#/components/schemas/CounterpartyAccount'
        cards:
          type: array
          description: The list of cards associated with this counterparty.
          items:
            $ref: '#/components/schemas/CounterpartyCard'
      required:
        - id
        - name
        - state
        - created_at
        - updated_at
    Counterparties:
      type: array
      items:
        $ref: '#/components/schemas/Counterparty'
    CounterpartyAccount:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: The ID of the counterparty's account.
        name:
          type: string
          description: The name of the counterparty.
        bank_country:
          $ref: '#/components/schemas/BankCountryCode'
        currency:
          $ref: '#/components/schemas/AccountCurrency'
        type:
          enum:
            - revolut
            - external
          description: Indicates the type of account.
          type: string
        account_no:
          type: string
          description: The bank account number of the counterparty.
        iban:
          type: string
          description: The IBAN number of the counterparty's account if applicable.
        sort_code:
          type: string
          description: The sort code of the counterparty's account if applicable.
        routing_number:
          type: string
          description: The routing number of the counterparty's account if applicable.
        bic:
          type: string
          description: The BIC number of the counterparty's account if applicable.
        clabe:
          type: string
          description: The CLABE number of the counterparty's account if applicable.
        ifsc:
          type: string
          description: The IFSC number of the counterparty's account if applicable.
        bsb_code:
          type: string
          description: The BSB number of the counterparty's account if applicable.
        route:
          type: string
          enum:
            - ach
            - fedwire
            - swift
          description: Routing method for US/USD transfers. Defaults to `ach` for US-registered businesses and `fedwire` for non-US businesses.
          example: ach
        bank_number:
          type: string
          description: Brazilian bank identification code (COMPE). Returned for BR counterparties.
          example: '033'
        branch_code:
          type: string
          description: Brazilian branch (agência) code. Returned for BR counterparties.
          example: '0001'
        account_type:
          type: string
          enum:
            - checking
            - savings
          description: Bank account type. Returned for BR, CO, and CL counterparties. Defaults to `checking` for US ACH transfers.
          example: checking
        tax_id:
          type: string
          maxLength: 20
          description: |-
            Tax identification number.
            Routed based on `bank_country` and recipient type:
            - **BR**:
              - **Individual**: CPF (Cadastro de Pessoas Físicas). Accepted formats: `^\d{11}$` or `^\d{3}\.\d{3}\.\d{3}-\d{2}$`.
              - **Company**: CNPJ (Cadastro Nacional da Pessoa Jurídica). Accepted formats: `^\d{14}$` or `^\d{2}\.\d{3}\.\d{3}/\d{4}-\d{2}$`.
            - **CO (company)**: NIT (Número de Identificación Tributaria). Accepted format: `^\d{10}$`.
            - **CL (individual, company)**: RUT (Rol Único Tributario).
        national_id:
          type: string
          description: |-
            National identification number.
            Specifies Colombian Cédula de Ciudadanía when `bank_country` is `CO` and `profile_type` is `personal`.
        phone:
          type: string
          maxLength: 20
          description: |-
            The phone number of the counterparty in [E.164](https://en.wikipedia.org/wiki/E.164) format.

            Country-specific formats:
            - **CO**: `+57` followed by 10 digits (`^\+?57\d{10}$`)
            - **LK**: `+94` followed by 10 digits (`^\+?94\d{10}$`)
            - **KR**: `+82` followed by 10 digits (`^\+?82\d{10}$`)
          example: '+573001234567'
        business_registration_id:
          type: string
          maxLength: 64
          description: Company registration number. Used for business LK counterparties.
          example: PV12345
        recipient_charges:
          enum:
            - 'no'
            - expected
          description: |-
            Indicates the possibility of the recipient charges.

            :::warning
            This field is deprecated and should be disregarded.
            It is returned for legacy purposes only.
            :::
          type: string
          deprecated: true
        address:
          $ref: '#/components/schemas/CounterpartyAddress'
      required:
        - id
        - currency
        - type
    CounterpartyAddress:
      type: object
      description: The address of the counterparty's account.
      required:
        - country
      properties:
        street_line1:
          type: string
          maxLength: 100
          description: Street line 1 information.
        street_line2:
          type: string
          maxLength: 100
          description: Street line 2 information.
        region:
          type: string
          maxLength: 50
          description: The name of the region (state or province), for example, Ontario for Canada.
        city:
          type: string
          maxLength: 50
          description: The name of the city.
        country:
          type: string
          pattern: ^[A-Z]{2}$
          description: The country of the counterparty, as a 2-letter [ISO 3166](https://en.wikipedia.org/wiki/List_of_ISO_3166_country_codes) code.
        postcode:
          type: string
          maxLength: 15
          description: The postcode of the counterparty address.
    CounterpartyCard:
      type: object
      required:
        - id
        - name
        - last_digits
        - scheme
        - country
        - currency
      properties:
        id:
          type: string
          format: uuid
          description: The ID of the counterparty's card.
        name:
          type: string
          description: The name of the counterparty.
        last_digits:
          type: string
          description: The last four digits of the card number.
        scheme:
          type: string
          enum:
            - visa
            - mastercard
          description: The card brand.
        country:
          $ref: '#/components/schemas/CountryCodeCard'
        currency:
          $ref: '#/components/schemas/Currency'
    CounterpartyError:
      type: object
      properties:
        code:
          type: integer
          description: The error code.
        message:
          type: string
          description: The description of the error.
        params:
          $ref: '#/components/schemas/CounterpartyErrorParams'
      required:
        - code
        - message
    CounterpartyErrorParams:
      type: object
      description: Additional parameters related to the error.
      properties:
        counterparty_id:
          type: string
          format: uuid
          description: The ID of the Revolut counterparty (i.e. internal counterparty) that already exists.
    CountryCode:
      type: string
      pattern: ^[A-Z]{2}$
      description: The counterparty's bank country, provided as a 2-letter [ISO 3166](https://en.wikipedia.org/wiki/List_of_ISO_3166_country_codes) code.
    CountryCodeCard:
      type: string
      pattern: ^[A-Z]{2}$
      description: The country of the card issuer, provided as a 2-letter [ISO 3166](https://en.wikipedia.org/wiki/List_of_ISO_3166_country_codes) code.
    CountryCodeMerchant:
      type: string
      pattern: ^[A-Z]{2,3}$
      description: |-
        The bank country of the merchant, provided as an [ISO 3166](https://en.wikipedia.org/wiki/List_of_ISO_3166_country_codes) code.
        Typically 3 letters, though in some cases, card networks might provide it as a 2-letter code.
    CreateAccountingCategoryRequest:
      type: object
      description: The accounting category to create.
      required:
        - name
        - code
      properties:
        name:
          type: string
          description: The full name for the accounting category.
          minLength: 1
          maxLength: 60
          example: Work From Home equipment
        code:
          type: string
          description: The code name for the accounting category.
          minLength: 1
          maxLength: 50
          example: WFH
        default_tax_rate_id:
          type: string
          format: uuid
          description: The ID of the default [tax rate](https://developer.revolut.com/docs/api/business#get-tax-rate) that should be applied to items in this accounting category unless overridden for a specific item.
          example: f93f6c3e-bf95-4b58-bfcd-e642c4fc098e
    CounterpartyCountriesResponse:
      type: object
      description: The response containing supported bank countries and their available currencies.
      properties:
        countries:
          type: array
          description: A list of supported bank countries.
          items:
            $ref: '#/components/schemas/CounterpartyCountry'
      required:
        - countries
    CounterpartyCountry:
      type: object
      description: A supported bank country with its available currencies.
      properties:
        country:
          $ref: '#/components/schemas/BankCountryCode'
        currencies:
          type: array
          description: The currencies available for counterparty creation in this country.
          items:
            $ref: '#/components/schemas/Currency'
      required:
        - country
        - currencies
    CounterpartyRequirementsResponse:
      type: object
      description: The response containing applicable counterparty fields and their validation rules.
      properties:
        fields:
          type: array
          description: A list of applicable and conditionally required fields for the specific counterparty context.
          items:
            $ref: '#/components/schemas/CounterpartyRequirementsField'
      required:
        - fields
    CounterpartyRequirementsField:
      type: object
      description: Represents a contextual field and its rules.
      properties:
        name:
          type: string
          description: |-
            The name of the field to be provided in the [Create a counterparty endpoint](https://developer.revolut.com/docs/api/business#add-counterparty) request body. 
            Matches the field names in the Create a counterparty endpoint exactly (e.g. `first_name`, `last_name`, `tax_id`, `route`, `account_type`).
        required:
          type: boolean
          description: Indicates whether this field must be provided when creating the counterparty.
        regex:
          $ref: '#/components/schemas/CounterpartyRequirementsFieldRegex'
        options:
          type: array
          description: |-
            A list of allowed values for the field (enum).
            If provided, the field value must be one of these options.
          items:
            $ref: '#/components/schemas/CounterpartyRequirementsFieldOption'
      required:
        - name
        - required
    CounterpartyRequirementsFieldRegex:
      type: object
      description: Regular expression validation rules.
      properties:
        pattern:
          type: string
          description: The regex pattern the field value must match.
        description:
          type: string
          description: A human-readable description of the regex constraint.
      required:
        - pattern
        - description
    CounterpartyRequirementsFieldOption:
      type: object
      description: An allowed value option for the field.
      properties:
        value:
          type: string
          description: The accepted value to be passed to the API.
        default:
          type: boolean
          description: Indicates the default option for the field if there is one.
      required:
        - value
    CreateCounterpartyRequest:
      type: object
      properties:
        profile_type:
          type: string
          enum:
            - personal
            - business
          description: |-
            The type of the Revolut profile.
            Indicates whether the counterparty is a personal or business account.
            Provide it when adding a Revolut counterparty via Revtag.
        revtag:
          type: string
          description: The [Revtag](https://help.revolut.com/help/transfers/internal-transfers/username-payments/revtags/) of the counterparty to add.
        name:
          type: string
          description: |
            The name of the counterparty, provided when the counterparty is being added via **Revtag**.

            If specified, `individual_name` and `company_name` must be empty.

            :::note
            The name that you provide must match or closely match the actual name associated with the account that you're trying to add.
            Otherwise, the creation fails and a `404` error is returned.
            :::
        company_name:
          type: string
          description: |-
            The name of the counterparty, provided when the counterparty is a **company** (business account type) and is **not** being added via Revtag.

            If specified, `individual_name` and `name` must be empty.

            :::warning
            The `company_name` must contain at least 2 letters (not just characters).
            For example, names like `12` will fail validation because they are two characters but not two letters.
            :::
        individual_name:
          $ref: '#/components/schemas/IndividualName'
        bank_country:
          $ref: '#/components/schemas/BankCountryCode'
        currency:
          $ref: '#/components/schemas/Currency'
        account_no:
          type: string
          description: The bank account number of the counterparty.
        iban:
          type: string
          description: The IBAN number of the counterparty's account. This field is displayed for IBAN countries.
        sort_code:
          type: string
          description: The sort code of the counterparty's account. This field is required for GBP accounts.
        routing_number:
          type: string
          description: The routing number of the counterparty's account. This field is required for USD accounts.
        bic:
          type: string
          description: The BIC number of the counterparty's account. This field is required for non-SEPA IBAN/SWIFT.
        clabe:
          type: string
          description: The CLABE number of the counterparty's account. This field is required for SWIFT MX.
        ifsc:
          type: string
          description: The IFSC number of the counterparty's account. This field is required for INR accounts.
        bsb_code:
          type: string
          description: The BSB number of the counterparty's account. This field is required for AUD accounts.
        address:
          $ref: '#/components/schemas/BeneficiaryAddress'
        route:
          type: string
          enum:
            - ach
            - fedwire
            - swift
          description: |-
            Routing method for US USD transfers. When omitted, defaults to `ach` for US-registered businesses and `fedwire` for non-US businesses. 

            Required when `bank_country` is `US` and the desired routing method differs from the default.
          example: ach
        bank_number:
          type: string
          minLength: 3
          maxLength: 3
          description: Brazilian bank identification code (COMPE). Required for BR counterparties.
          example: '033'
        branch_code:
          type: string
          minLength: 4
          maxLength: 4
          description: Brazilian branch (agência) code. Required for BR counterparties.
          example: '0001'
        account_type:
          type: string
          enum:
            - checking
            - savings
          description: |-
            Bank account type. Defaults to `checking` for US ACH transfers when omitted. 

            Required for BR, CO, and CL counterparties.
          example: checking
        tax_id:
          type: string
          maxLength: 20
          description: |-
            Tax identification number.

            Required and routed based on `bank_country` and recipient type:
            - **BR**:
              - **Individual**: CPF (Cadastro de Pessoas Físicas). Accepted formats: `^\d{11}$` or `^\d{3}\.\d{3}\.\d{3}-\d{2}$`.
              - **Company**: CNPJ (Cadastro Nacional da Pessoa Jurídica). Accepted formats: `^\d{14}$` or `^\d{2}\.\d{3}\.\d{3}/\d{4}-\d{2}$`.
            - **CO (company)**: NIT (Número de Identificación Tributaria). Accepted format: `^\d{10}$`.
            - **CL (individual, company)**: RUT (Rol Único Tributario).
        national_id:
          type: string
          description: National identification number. Required  when `bank_country` is `CO` and `profile_type` is `personal`, must specify Colombian Cédula de Ciudadanía.
        phone:
          type: string
          maxLength: 20
          description: |-
            The phone number of the counterparty in [E.164](https://en.wikipedia.org/wiki/E.164) format.

            - For internal (Revolut) counterparties: the recipient's Revolut phone number used to look them up.
            - For external counterparties in CO, KR, and LK: the bank account phone number. Required when `bank_country` is `CO`, `KR`, or `LK`.

            Country-specific formats:
            - **CO**: `+57` followed by 10 digits (`^\+?57\d{10}$`)
            - **KR**: `+82` followed by 10 digits (`^\+?82\d{10}$`)
            - **LK**: `+94` followed by 10 digits (`^\+?94\d{10}$`)
          example: '+573001234567'
        business_registration_id:
          type: string
          maxLength: 64
          description: 'Company registration number. Required for business LK counterparties (`profile_type`: `business`).'
          example: PV12345
    CreateLabelGroupRequest:
      type: object
      required:
        - name
        - labels
      properties:
        name:
          description: The name for the new label group.
          type: string
          minLength: 1
          maxLength: 100
        labels:
          description: |-
            The labels to create in the new group.

            The maximum number of labels you can create for a new group is 200.
            If you need to add more, you can add them later by [creating new labels individually](https://developer.revolut.com/docs/api/business#create-label).
          type: array
          minItems: 1
          maxItems: 200
          items:
            $ref: '#/components/schemas/CreateLabelRequest'
    CreateLabelRequest:
      type: object
      required:
        - name
      properties:
        name:
          description: The name for the new label.
          type: string
          minLength: 1
          maxLength: 100
    CreatePaymentDraftRequest:
      type: object
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 255
          description: The title of the payment draft.
        schedule_for:
          type: string
          format: date
          description: The scheduled date of the payment draft in [ISO 8601](https://en.wikipedia.org/wiki/ISO_8601) format.
        payments:
          type: array
          description: The details of the payment(s) to be made.
          items:
            $ref: '#/components/schemas/PaymentRequest'
      required:
        - payments
    CreatePaymentDraftResponse:
      type: object
      properties:
        id:
          type: string
          format: number
          description: The ID of the payment draft created.
      required:
        - id
    CreatePaymentDraftPaymentResponse:
      type: object
      required:
        - id
      properties:
        id:
          type: string
          format: uuid
          description: The ID of the payment added to the draft.
    CreatePayoutLinkRequest:
      type: object
      required:
        - counterparty_name
        - request_id
        - account_id
        - amount
        - currency
        - reference
      properties:
        counterparty_name:
          $ref: '#/components/schemas/PayoutLinkCounterpartyName'
        save_counterparty:
          type: boolean
          description: |-
            Indicates whether to save the recipient as your counterparty upon link claim.
            If `false` then the counterparty will not show up on your counterparties list, for example, when you retrieve your counterparties. 
            However, you will still be able to retrieve this counterparty by its ID.

            If you don't choose to save the counterparty on link creation, you can do it later from your transactions list in the Business app.
          default: false
        request_id:
          $ref: '#/components/schemas/PayoutLinkRequestId'
          description: |-
            The ID of the request, provided by the sender.

            :::warning
            To ensure that a link payment is not processed multiple times if there are network or system errors, the same `request_id` should be used for requests related to the same link.
            :::
          example: 5a7fcb46-4be4-47d4-a56f-27a2e5b78dd1
        account_id:
          $ref: '#/components/schemas/PayoutLinkAccountId'
        amount:
          $ref: '#/components/schemas/PayoutLinkAmount'
        currency:
          $ref: '#/components/schemas/Currency'
          example: GBP
        reference:
          type: string
          minLength: 1
          maxLength: 100
          description: |-
            The reference for the payout link.
            A piece of text or number you provide to help identify what the payment relates to.
            It can be used, for example, for reconciliation or tracking purposes.

            You might include an invoice number, account or transaction ID, or any other reference meaningful to you or the recipient.
        payout_methods:
          $ref: '#/components/schemas/PayoutLinkPayoutMethods'
          default:
            - revolut
            - bank_account
        expiry_period:
          $ref: '#/components/schemas/PayoutLinkExpiryPeriod'
        transfer_reason_code:
          $ref: '#/components/schemas/TransferReasonCode'
    CreateTaxRateRequest:
      allOf:
        - $ref: '#/components/schemas/AccountingTaxRate'
        - description: The tax rate to create.
          required:
            - name
            - percentage
    CreateWebhookRequest:
      type: object
      required:
        - url
      properties:
        url:
          $ref: '#/components/schemas/Url'
          description: A valid webhook URL to which to send event notifications. The supported protocol is `https`.
        events:
          description: |-
            A list of event types to subscribe to.
            If you don't provide it, you're automatically subscribed to the [default event types](https://developer.revolut.com/docs/guides/manage-accounts/webhooks/about-webhooks#default-event-types).
          type: array
          items:
            $ref: '#/components/schemas/WebhookEventType'
          default:
            - TransactionCreated
            - TransactionStateChanged
    Currency:
      type: string
      pattern: ^[A-Z]{3}$
      description: '[ISO 4217](https://en.wikipedia.org/wiki/ISO_4217) currency code in upper case.'
    Error:
      type: object
      properties:
        code:
          type: integer
          description: The error code.
        message:
          type: string
          description: The description of the error.
      required:
        - code
        - message
    ErrorWithId:
      required:
        - code
        - message
        - error_id
      type: object
      properties:
        error_id:
          type: string
          description: The ID of the specific error instance. Used for traceability.
        code:
          type: integer
          description: The error code.
        message:
          type: string
          description: The description of the error.
    ErrorUnauthorized:
      type: object
      description: |-
        Unauthorised

        Returned, for example, when the credentials you used to make the request are invalid.
        For more information, see the **Authorization** section.
      allOf:
        - $ref: '#/components/schemas/ErrorWithStatus'
    ErrorUnprocessableEntity:
      type: object
      description: |-
        Unprocessable entity

        Returned, for example, when you try to modify a resource which is not a in state that would allow for modifications, e.g. a card invitation in state `failed`.
      properties:
        code:
          type: integer
          description: The error code.
        message:
          type: string
          description: The description of the error.
      required:
        - message
