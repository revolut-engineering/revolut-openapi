          description: |-
            The list of IDs of merchants to which the control applies.

            :::tip
            To find merchant IDs, check transaction details (→ `merchant.id`).
            You can fetch transaction details for a [specific transaction](https://developer.revolut.com/docs/api/business#get-transaction#response) or for [all transactions](https://developer.revolut.com/docs/api/business#get-transactions#response).
            :::
          items:
            type: string
            format: uuid
    Money:
      type: object
      description: A monetary amount and its associated currency.
      properties:
        amount:
          type: number
          format: double
          description: Amount in major units.
        currency:
          $ref: '#/components/schemas/Currency'
      required:
        - amount
        - currency
    PaymentDraftResponse:
      type: object
      properties:
        scheduled_for:
          type: string
          format: date
          description: The scheduled date of the payment draft in [ISO 8601](https://en.wikipedia.org/wiki/ISO_8601) format.
        title:
          type: string
          description: The title of the payment draft.
        payments:
          type: array
