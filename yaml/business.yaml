  /counterparties/{counterparty_id}/payment-methods/{payment_method_id}:
    patch:
      summary: Update a counterparty's payment method
      operationId: updateCounterpartyPaymentMethod
      description: |-
        Update the **address** of a counterparty's payment method.

        :::tip [What is a payment method?]
        A payment method is an individual account or card linked to a counterparty. When you [retrieve a counterparty](https://developer.revolut.com/docs/api/business#get-counterparty), the response includes an `accounts` array and a `cards` array — each entry in these arrays is a payment method with its own `id`.
        :::

        As only bank account payment methods have an address, you can use this endpoint to update the address of a counterparty's bank account.

        To get the `payment_method_id` for the bank account, [retrieve the counterparty](https://developer.revolut.com/docs/api/business#get-counterparty) and use the `id` from the `accounts` array in the response.

        You must provide the full address object — all required address fields must be present in the request.
        Omitted optional fields will retain their existing values.

        For more information, see the guide: [Update a counterparty's payment method](https://developer.revolut.com/docs/guides/manage-accounts/counterparties/update-counterparty-payment-method).
      security:
        - AccessToken:
            - WRITE
      parameters:
        - name: counterparty_id
          in: path
          required: true
          description: The ID of the counterparty.
          schema:
            type: string
            format: uuid
        - name: payment_method_id
          in: path
          required: true
          description: The ID of the payment method to update. To get the `payment_method_id` for the bank account, [retrieve the counterparty](https://developer.revolut.com/docs/api/business#get-counterparty) and use the `id` from the `accounts` array in the response.
          schema:
            type: string
            format: uuid
      requestBody:
        description: The updated address details.
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCounterpartyPaymentMethodRequest'
            examples:
              update_address:
                summary: Update a counterparty's address
                value:
                  address:
                    country: GB
                    street_line1: 7 Revolut Street
                    street_line2: Floor 3
                    city: London
                    postcode: EC2V 8PH
      responses:
        '204':
          description: The address was updated
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorWithId'
      tags:
        - Counterparties
  /rate:
    get:
      summary: Get an exchange rate
      operationId: getRate
      description: |-
        Get the sell exchange rate between two currencies.

        You can check the [currencies supported in Production](https://help.revolut.com/business/help/receiving-payments/currency-exchanges/which-currencies-can-i-exchange-and-keep-in-my-account/) in the Revolut Help Centre.
        Some of these currencies might not be available in Sandbox.

        For more information, see the guides: [Exchange money](https://developer.revolut.com/docs/guides/manage-accounts/exchange-money).
      security:
        - AccessToken:
            - READ
      tags:
        - Foreign exchange
      parameters:
        - name: from
          in: query
          required: true
          description: The currency that you exchange from in [ISO 4217](https://en.wikipedia.org/wiki/ISO_4217) format.
          schema:
            $ref: '#/components/schemas/Currency'
        - name: amount
          in: query
          required: false
          description: The amount of the currency to exchange **from**. The default value is `1.00`.
          schema:
            type: number
            format: double
            default: '1.00'
        - name: to
          in: query
          required: true
          description: The currency that you exchange to in [ISO 4217](https://en.wikipedia.org/wiki/ISO_4217) format.
          schema:
            $ref: '#/components/schemas/Currency'
      responses:
        '200':
          description: The exchange rate information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExchangeRateResponse'
              example:
                from:
                  amount: 1
                  currency: EUR
                to:
                  amount: 1
                  currency: USD
                rate: 1.0044090351
                fee:
                  amount: 0
                  currency: EUR
                rate_date: '2022-08-31T17:30:34Z'
        '404':
          description: |-
            Not found

            Returned, for example, when the exchange rate is unknown
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                message: Exchange rate unknown
                code: 3472
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /exchange:
    post:
      summary: Exchange money
      operationId: exchangeMoney
      description: |-
        Exchange money using one of these methods: 

        - **Sell currency**: You know the amount of currency to sell. 
          For example, you want to exchange 135.5 USD to some EUR. 

          Specify the amount in the `from` object.
        - **Buy currency**: You know the amount of currency to buy. 
          For example, you want to exchange some USD to 200 EUR. 

          Specify the amount in the `to` object.

        :::note
        You must specify the `amount` field only once, either in the `from` object or in the `to` object.
        :::

        You can check the [currencies supported in Production](https://help.revolut.com/business/help/receiving-payments/currency-exchanges/which-currencies-can-i-exchange-and-keep-in-my-account/) in the Revolut Help Centre.
        Some of these currencies might not be available in Sandbox.

        For more information, see the guides: [Exchange money](https://developer.revolut.com/docs/guides/manage-accounts/exchange-money).
      security:
        - AccessToken:
            - READ
            - PAY
      tags:
        - Foreign exchange
      requestBody:
        description: Specify the exchange information
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExchangeRequest'
            examples:
              sell:
                summary: Sell
                value:
                  from:
                    account_id: af98333c-ea53-482b-93c2-1fa5e4eae671
                    currency: USD
                    amount: 135.5
                  to:
                    account_id: b7ec67d3-5af1-42c8-bece-3d285774894d
                    currency: EUR
                  reference: exchange
                  request_id: A1pH4num3ric2
              buy:
                summary: Buy
                value:
                  from:
                    account_id: af98333c-ea53-482b-93c2-1fa5e4eae671
                    currency: USD
                  to:
                    account_id: b7ec67d3-5af1-42c8-bece-3d285774894d
                    currency: EUR
                    amount: 200
                  reference: exchange
                  request_id: A1pH4num3ric2
      responses:
        '200':
          description: Exchange operation details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExchangeResponse'
              example:
                id: 630f9c2e-2e74-a06d-ab61-deb7ggkkd6cb
                state: completed
                created_at: '2022-08-31T17:36:46.656876Z'
                completed_at: '2022-08-31T17:36:46.657239Z'
        '400':
          description: |-
            Bad request

            For example, the exchange reason is required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                code: 3448
                message: Exchange reason is required
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /exchange-reasons:
