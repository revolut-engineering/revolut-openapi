            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                code: 1214
                message: Card invitation not found
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    patch:
      summary: Update card invitation settings
      operationId: updateCardInvitation
      description: |-
        Update settings for a specific card invitation, based on its ID.
        You can update successfully created invitations that have not been claimed yet (`state=created`).

        :::note
        - This feature is not available in Sandbox.
        - To increase your account's card limits, please contact [Revolut API Support](mailto:api-requests@revolut.com).
        :::

        :::warning
        Some spend control parameters can affect one another.
        When updating spend controls, review the resulting settings in the response to ensure they reflect the configuration you intended.
        :::

        For more information, see the guides: [Manage card invitations](https://developer.revolut.com/docs/guides/manage-accounts/cards/manage-card-invitations).
      security:
        - AccessToken:
            - WRITE
      tags:
        - Card invitations
      parameters:
        - name: card_invitation_id
          in: path
          required: true
          description: The ID of the card invitation.
          schema:
            type: string
            format: uuid
          example: 4016b891-bb50-4bd2-8a1b-adb74f4aacdd
      requestBody:
        required: true
        content:
          application/json:
            schema:
              properties:
                label:
                  type: string
                  description: |-
                    The label of the card.

                    Cards without labels are not allowed.
                    If set to `null`, the default label will be set according to the card's type.

                    :::tip[Default labels]
                    For virtual cards, the default label is `Virtual`.
                    For physical cards, depending on the type, it can be, for example, `Standard` or `Metal`. 

                    As these values depend on available card types, they are subject to change over time.
                    :::
                  minLength: 1
                  maxLength: 30
                  default: Default label according to card's type
                spending_limits:
                  description: |-
                    All spending limits to be set for the card.

                    You can have at most 1 periodic (day/week/month/quarter/all-time) and 1 non-periodic (single transaction) limit at a time.
                    If you try to specify 2 periodic limits at a time, it will result in an error.

                    Use `null` as the value for a specific limit to erase that limit.
                    Use `null` as the value for the `spending_limits` object to erase all limits.
                  type: object
                  $ref: '#/components/schemas/SpendingLimitsSchema'
                spending_period:
                  description: |-
                    The controls for the card's spending period.

                    They let you set or modify the dates when the card should become available or unavailable for spending, and define what happens after the end date.

                    If specified, you must provide at least one of these:
                    - `start_date`
                    - `end_date` together with `end_date_action`

                    The spending period dates must be in the future.

                    The dates are inclusive.
                    This means that:
                    - If you set the `start_date` to `2026-03-31`, the card will become active on that day.
                    - If you set the `end_date` to `2027-12-31`, the card will be active through that day, and will be locked/terminated starting on 1st Jan 2028.

                    :::note
                    You can update the spending period settings in a few ways, depending on your use case:
                    - To remove the start date, but keep the end date settings, provide the current `spending_period` settings without the `start_date`.
                    - To remove the start date when no end date is set, provide the `spending_period.start_date` set to `null`.
                    - To remove **all** spending period settings, provide `spending_period` set to `null`.

                    If you wish to erase a spending period end date, you can do this in a similar way, applying the steps to `spending_period.end_date` and `spending_period.end_date_action`.
                    :::
                  type: object
                  allOf:
                    - $ref: '#/components/schemas/SpendingPeriodSchema'
                categories:
                  type: array
                  description: |-
                    The list of merchant categories to be available for card spending.
                    Use `null` to erase the value and reset to empty (all categories will be allowed).

                    :::note
                    The `categories` and `merchant_controls` parameters have the following restrictions:
                    - If you set `categories`, you **cannot** set `merchant_controls.control_type` to `allow`.
                    - You **can** set `merchant_controls.control_type` to `block`.
                    - You may also set **either** `categories` or `merchant_controls` independently, or **set neither**.
                    - Both parameters can be used together **only** if `merchant_controls.control_type` is `block`.
                    :::
                  items:
                    $ref: '#/components/schemas/BusinessMerchantCategory'
                merchant_controls:
                  description: |-
                    The merchant-level controls for card spending.

                    They let you block or allow the card to only transact with specific merchants:
                    - `allow`: permits only the specified merchants (cannot be used if the `categories` parameter is set).
                    - `block`: blocks the specified merchants (can be used with or without `categories`).
                  type: object
                  $ref: '#/components/schemas/MerchantControlsSchema'
                countries:
                  description: The list of countries where the card can be used, provided as 2-letter [ISO 3166](https://en.wikipedia.org/wiki/List_of_ISO_3166_country_codes) codes.
                  type: array
                  items:
                    type: string
                    pattern: ^[A-Z]{2}$
                    example: GB
                accounts:
                  type: array
                  description: |-
                    The list of accounts to link to the card.
                    If not specified, all accounts will be linked.
                    To retrieve account IDs, use the [`GET /accounts` operation](https://developer.revolut.com/docs/api/business#get-accounts).
                  items:
                    type: string
                    format: uuid
            examples:
              update_all_properties:
                summary: Update all properties
                value:
                  label: New card label
                  spending_limits:
                    single:
                      amount: 100
                      currency: GBP
                    month:
                      amount: 300
                      currency: GBP
                  spending_period:
                    start_date: '2025-12-20'
                    end_date: '2027-12-20'
                    end_date_action: lock
                  categories:
                    - services
                    - shopping
                    - furniture
                  merchant_controls:
                    control_type: block
                    merchant_ids:
                      - 46df0a1b-3678-4ded-9cf5-9f4da1b5019d
                      - e8a87432-f71e-4deb-be84-969a02792929
                      - 3f09819f-63d1-473a-966c-54d8b9f43a93
                  countries:
                    - GB
                    - SG
                    - ES
                  accounts:
                    - f52c6c84-26b9-4e95-bbcf-99ed6523fb51
                    - 9ae4345a-5ee5-496b-b776-241fcc5a5ba4
              erase_spending_period_start_date:
                summary: Erase spending period start date and update end date
                value:
                  spending_period:
                    start_date: null
                    end_date: '2027-12-20'
                    end_date_action: terminate
              erase_all_spending_limits:
                summary: Erase all spending limits
                value:
                  spending_limits: null
              erase_single_transaction_limit:
                summary: Erase the single-transaction limit
                value:
                  spending_limits:
                    single: null
              allow_specific_merchants:
                summary: Allow only specific merchants
                value:
                  categories: []
                  merchant_controls:
                    control_type: allow
                    merchant_ids:
                      - 46df0a1b-3678-4ded-9cf5-9f4da1b5019d
                      - e8a87432-f71e-4deb-be84-969a02792929
      responses:
        '200':
          description: Information about the updated card invitation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CardInvitationUpdatedResponse'
              examples:
                update_all_properties:
                  $ref: '#/components/examples/cardInvitationUpdatedAllProperties'
                erase_spending_period_start_date:
                  $ref: '#/components/examples/cardInvitationUpdatedEraseSpendingPeriodStartDate'
                erase_all_spending_limits:
                  $ref: '#/components/examples/cardInvitationUpdatedEraseAllSpendingLimits'
                erase_single_transaction_limit:
                  $ref: '#/components/examples/cardInvitationUpdatedEraseSingleTransactionLimit'
                allow_specific_merchants:
                  $ref: '#/components/examples/cardInvitationUpdatedAllowSpecificMerchants'
        '400':
          description: |-
            Bad request

            Returned, for example, when there's nothing to update or the provided details are unsupported for this operation.

            If the invalid value is an array item, the error might indicate the array index of this faulty item, counting from `0`. 
            For example, if you provide the list of countries, such as `"countries": ["GB", "USA", ...]`, the first item (`GB`) has index `0`, the second item (`USA`) has index `1`, and so on.
            In the example, `USA` is invalid, because it should be a 2-letter code.
            In such a case, the error will indicate that `countries[1]` is invalid, thus pointing to the second item in the array, i.e. `USA`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                nothing_to_update:
                  summary: Empty request body - nothing to update
                  value:
                    code: 1112
                    message: Specify at least one parameter for card update
                invalid_spending_period_date_settings:
                  summary: Invalid spending period date settings
                  value:
                    code: 3000
                    message: At least one of start_date or end_date must be present
                invalid_spending_period_end_settings:
                  summary: Invalid spending period end settings
                  value:
                    code: 3000
                    message: end_date and end_date_action must be either both present or both empty
                spending_period_end_date_before_start_date:
                  summary: Spending period end date is sooner than start date
                  value:
                    code: 3000
                    message: end_date must be at or after 2025-12-28, but is 2024-12-20
                past_spending_period_end_date:
                  summary: Spending period start date is in the past
                  value:
                    code: 2102
                    message: Spending period start_date must be in the future
                multiple_periodic_limits:
                  summary: Multiple periodic spending limits at a time
                  value:
                    code: 3000
                    message: Only one periodic limit can be specified
                label_too_long:
                  summary: Card label too long
                  value:
                    code: 3000
                    message: Card label cannot contain more than 30 characters
                invalid_id:
                  $ref: '#/components/examples/cardErrorBadId'
                invalid_country_code:
                  $ref: '#/components/examples/cardErrorBadCountryCode'
        '401':
          description: |-
            Unauthorised

            Returned, for example, when the credentials you used to make the request are invalid.
            For more information, see the **Authorization** section.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorUnauthorized'
              examples:
                unauthorized:
                  $ref: '#/components/examples/errorUnauthorized'
        '404':
          description: |-
            Card invitation doesn't exist

            The card invitation for which you wish to update details does not exist.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                code: 3088
                message: Card invitation '3c059a42-24e1-4fd6-bfbe-f3c09234315f not found
        '422':
          description: |-
            Unprocessable Entity

            Returned, for example, when you try to update a card invitation that's not in state `created`.
            Such an invitation is no longer active and therefore cannot be modified.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorUnprocessableEntity'
              examples:
                unsupported_card_invitation_state:
                  summary: Card invitation is not in state 'created'
                  value:
                    message: Unable to update card invitation with state=redeemed
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /card-invitations/{cardInvitationId}/cancel:
    post:
      servers:
        - url: https://b2b.revolut.com/api/1.0
          description: Production server (uses live data)
      summary: Cancel a card invitation
      operationId: cancelCardInvitation
      description: |-
        Cancel a specific card invitation, based on its ID.

        :::note
        - This feature is not available in Sandbox.
        - To increase your account's card limits, please contact [Revolut API Support](mailto:api-requests@revolut.com).
        :::

        You can cancel successfully created invitations that have not been claimed yet (`state=created`).

        Once the card invitation is cancelled, it cannot be claimed or reactivated.

        A successful response does not get any content in return.

        For more information, see the guides: [Manage card invitations](https://developer.revolut.com/docs/guides/manage-accounts/cards/manage-card-invitations).
      security:
        - AccessToken:
            - WRITE
      tags:
        - Card invitations
      parameters:
        - name: card_invitation_id
          in: path
          required: true
          description: The ID of the card invitation to cancel.
          schema:
            type: string
            format: uuid
          example: 4016b891-bb50-4bd2-8a1b-adb74f4aacdd
      responses:
        '204':
          description: Card invitation successfully cancelled
        '400':
          description: |-
            Bad request

            Returned, for example, when the format of the invitation ID you provided is invalid.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                invalid_id:
                  $ref: '#/components/examples/cardErrorBadId'
        '401':
          description: |-
            Unauthorised

            Returned, for example, when the credentials you used to make the request are invalid.
            For more information, see the **Authorization** section.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorUnauthorized'
              examples:
                unauthorized:
                  $ref: '#/components/examples/errorUnauthorized'
        '404':
          description: |-
            Card invitation doesn't exist

            The card invitation you wish to cancel does not exist.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                code: 3088
                message: Card invitation '10a2069f-fc11-4d5f-82b4-29c4ecc3a62e' not found
        '422':
          description: |-
            Unprocessable entity

            Returned, for example, when you try to cancel a card invitation that's not in state `created`.
            Such an invitation is no longer active and therefore cannot be cancelled.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorUnprocessableEntity'
              examples:
                unsupported_card_invitation_state:
                  summary: Card invitation is not in state 'created'
                  value:
                    message: Unable to cancel card invitation with state=redeemed
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /cards:
    servers:
      - url: https://b2b.revolut.com/api/1.0
        description: Production server (uses live data)
    get:
      summary: Retrieve a list of cards
      operationId: getCards
      description: |-
        Get the list of all cards in your organisation.

        The results are paginated and sorted by the `created_at` date in reverse chronological order.
        Terminated cards are not included in the list.
        To check the status of a specific terminated card, [retrieve it by its ID](https://developer.revolut.com/docs/api/business#get-card).

        :::note
        - This feature is not available in Sandbox.
        - To increase your account's card limits, please contact [Revolut API Support](mailto:api-requests@revolut.com).
        :::

        For more information, see the guides: [Manage cards](https://developer.revolut.com/docs/guides/manage-accounts/cards/manage-cards).
      security:
        - AccessToken:
            - READ
      tags:
        - Cards
      parameters:
        - in: query
          name: created_before
          schema:
            type: string
            format: date-time
            default: the date-time at which the request is made
          description: |-
            Retrieves cards with `created_at` < `created_before`.
            The default value is the current date and time at which you are calling the endpoint.

            Provided in [ISO 8601](https://en.wikipedia.org/wiki/ISO_8601) format.
        - name: limit
          in: query
          required: false
          description: |-
            The maximum number of cards to return per page.

            To get to the next page, make a new request and use the `created_at` date of the last card returned in the previous response as the value for `created_before`.
          schema:
            type: number
            format: integer
            default: 100
            maximum: 100
            minimum: 1
      responses:
        '200':
          description: List of cards of the business
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CardsResponse'
              examples:
                list_of_cards:
                  $ref: '#/components/examples/cardsListSimple'
        '400':
          description: Bad pagination parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                code: 2101
                message: 'Parameter limit must be a valid integer in range: [1, 100].'
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    post:
      servers:
        - url: https://b2b.revolut.com/api/1.0
          description: Production server (uses live data)
      summary: Create a card
      operationId: createCard
      description: |-
        Create a new [team member card](https://developer.revolut.com/docs/guides/manage-accounts/cards/manage-cards#different-types-of-cards), [company card](https://developer.revolut.com/docs/guides/manage-accounts/cards/manage-cards#different-types-of-cards), or [auto-issued card](https://developer.revolut.com/docs/guides/manage-accounts/cards/manage-cards#different-types-of-cards).

        When using the API, you can create only virtual cards.
        To create a physical card, use the [Revolut Business app](https://business.revolut.com).

        :::note
        - This feature is not available in Sandbox.
        - To increase your account's card limits, please contact [Revolut API Support](mailto:api-requests@revolut.com).
        :::

        For more information, see the guides: [Manage cards](https://developer.revolut.com/docs/guides/manage-accounts/cards/manage-cards).
      security:
        - AccessToken:
            - WRITE
      tags:
        - Cards
      requestBody:
        description: Card to create
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                request_id:
                  type: string
                  description: |-
                    A unique ID of the request that you provide.

                    There is no strict requirement on the format of this ID, but we suggest using v4 UUIDs.

                    :::warning
                    This ID is used to prevent duplicate card creation requests in case of a lost connection or client error, so make sure you use the same `request_id` for requests related to the same card.
                    The deduplication is limited to 24 hours counting from the first request using a given ID.
                    For more information, see the guides: [Manage cards - Idempotency](https://developer.revolut.com/docs/guides/manage-accounts/cards/manage-cards#idempotency).
                    :::
                  maxLength: 40
                holder_id:
                  type: string
                  format: uuid
                  description: |-
                    The ID of the team member to assign as the holder of the card.

                    :::tip
                    To retrieve a team member's ID, use the [`GET /team-members` operation](https://developer.revolut.com/docs/api/business#get-team-members).
                    :::

                    For virtual cards (`virtual=true`), this field is optional.                    
                    If not provided, the type of the issued card depends on `contact_ids`:
                      - `contact_ids` provided → [company card](https://developer.revolut.com/docs/guides/manage-accounts/cards/manage-cards#different-types-of-cards)
                      - `contact_ids` not specified → [auto-issued card](https://developer.revolut.com/docs/guides/manage-accounts/cards/manage-cards#different-types-of-cards)
                contact_ids:
                  description: |-
                    The list of [contacts](https://help.revolut.com/business/help/cards/more-on-cards/company-cards/) for the card.
                    Up to 5 team members sharing the card, much like co-holders.
                    Can be [edited](https://developer.revolut.com/docs/api/business#update-card-contacts).

                    Allowed only for [company cards](https://developer.revolut.com/docs/guides/manage-accounts/cards/manage-cards#different-types-of-cards) (`virtual=true`, `holder_id` not specified).
                  type: array
                  minItems: 1
                  maxItems: 5
                  items:
                    type: string
                    format: uuid
                product:
                  description: |-
                    The card product offered by the card provider for this card.
                    In other words, the program that the card is issued under.

                    Provided only for virtual cards with no holder ID (`virtual=true`, and `holder_id` not specified):
                    - **Required** for [auto-issued cards](https://developer.revolut.com/docs/guides/manage-accounts/cards/manage-cards#different-types-of-cards) (`contact_ids` not specified)
                    - Optional for [company cards](https://developer.revolut.com/docs/guides/manage-accounts/cards/manage-cards#different-types-of-cards) (`contact_ids` specified)

                    Not allowed for [team member cards](https://developer.revolut.com/docs/guides/manage-accounts/cards/manage-cards#different-types-of-cards) (`holder_id` present).

                    :::note
                    This property is only available to travel intermediaries using our travel solution.
                    To use it, please contact [Revolut API Support](mailto:api-requests@revolut.com).
                    :::
                  type: object
                  required:
                    - code
                  properties:
                    code:
                      type: string
                      description: The code of the card product.
                      example: MBJ
                virtual:
                  type: boolean
                  enum:
                    - true
                  description: |-
                    Specifies the type of the card. 
                    Must be set to `true`, as with the API, you can create only virtual cards.

                    :::tip
                    To create a physical card, use the [Revolut Business app](https://business.revolut.com).
                    :::
                label:
                  type: string
                  description: |-
                    The label for the issued card, displayed in the UI to help distinguish between cards.
                    If not specified, no label will be added.
                  maxLength: 30
                references:
                  description: |-
                    References for the card.
                    Up to 5 name-value pairs assigned to the card for tracking.

                    :::info
                    Each time the card is used, the references are recorded in the [transaction details](https://developer.revolut.com/docs/api/business#get-transaction#response) (`card.references`), helping track transactions made with this card.
                    :::

                    The names must be unique.
                    The references can be [amended](https://developer.revolut.com/docs/api/business#update-card-references) up to 10 times.

                    References are only supported for cards owned by the business (i.e. [company](https://developer.revolut.com/docs/guides/manage-accounts/cards/manage-cards#different-types-of-cards) or [auto-issued cards](https://developer.revolut.com/docs/guides/manage-accounts/cards/manage-cards#different-types-of-cards)).
                    They are **not** supported for [team member cards](https://developer.revolut.com/docs/guides/manage-accounts/cards/manage-cards#different-types-of-cards) (i.e. with `holder_id` present). 

                    :::note
                    The references recorded on a transaction are those assigned to the card at the time the transaction took place.
                    If the references are amended, they will only be applied to future transactions. 
                    Existing transaction are not affected.
                    :::
                  $ref: '#/components/schemas/CardReferences'
                spending_limits:
                  description: |-
                    All spending limits set for the card.

                    You can have at most 1 periodic (day/week/month/quarter/all-time) and 1 non-periodic (single transaction) limit at a time.
                    If you try to specify 2 periodic limits at a time, it will result in an error.
                  type: object
                  $ref: '#/components/schemas/SpendingLimitsSchema'
                spending_period:
                  description: |-
                    The controls for the card's spending period.

                    They let you set the dates when the card becomes available or unavailable for spending, and define what happens after the end date.

                    If specified, you must provide at least one of these:
                    - `start_date`
                    - `end_date` together with `end_date_action`

                    The dates provided must be in the future.
                  type: object
                  allOf:
                    - $ref: '#/components/schemas/SpendingPeriodSchema'
                categories:
                  type: array
                  description: |-
                    The list of merchant categories to be available for card spending.
                    If not specified, all categories will be allowed.

                    :::note
                    The `categories` and `merchant_controls` parameters have the following restrictions:
                    - If you set `categories`, you **cannot** set `merchant_controls.control_type` to `allow`.
                    - You **can** set `merchant_controls.control_type` to `block`.
                    - You may also set **either** `categories` or `merchant_controls` independently, or **set neither**.
                    - Both parameters can be used together **only** if `merchant_controls.control_type` is `block`.
                    :::
                  items:
                    $ref: '#/components/schemas/BusinessMerchantCategory'
                merchant_controls:
                  description: |-
                    The merchant-level controls for card spending.

                    They let you block or allow the card to only transact with specific merchants: 
                    - `allow`: permits only the specified merchants (cannot be used if the `categories` parameter is set).
                    - `block`: blocks the specified merchants (can be used with or without `categories`).
                  type: object
                  $ref: '#/components/schemas/MerchantControlsSchema'
                countries:
                  description: Restricts card use to specified countries, provided as 2-letter [ISO 3166](https://en.wikipedia.org/wiki/List_of_ISO_3166_country_codes) codes.
                  type: array
                  items:
                    type: string
                    pattern: ^[A-Z]{2}$
                    example: GB
                accounts:
                  type: array
                  description: |-
                    The list of accounts to link to the card.
                    If not specified, all accounts will be linked.
                    To retrieve account IDs, use the [`GET /accounts` operation](https://developer.revolut.com/docs/api/business#get-accounts).
                  items:
                    type: string
                    format: uuid
              required:
                - request_id
                - virtual
            examples:
              team_member_card:
                $ref: '#/components/examples/cardIndividualCreate'
              company_card:
                $ref: '#/components/examples/cardCompanyCreate'
              autogenerated_card:
                $ref: '#/components/examples/cardAutogeneratedCreate'
              card_with_spending_period_start_date:
                $ref: '#/components/examples/cardWithSpendingPeriodStartDateCreate'
      responses:
        '200':
          description: Information about the created card
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CardCreatedResponse'
              examples:
                team_member_card:
                  $ref: '#/components/examples/cardIndividualDetails'
                company_card:
                  $ref: '#/components/examples/cardCompanyDetails'
                autogenerated_card:
                  $ref: '#/components/examples/cardAutogeneratedDetails'
                card_with_spending_period_start_date:
                  $ref: '#/components/examples/cardWithSpendingPeriodStartDateDetails'
        '400':
          description: |-
            Bad Request

            Returned, for example, when your request is malformed, missing required fields, or when it contains fields that cannot co-exist or unsupported values.

            If the invalid value is an array item, the error might indicate the array index of this faulty item, counting from `0`. 
            For example, if you provide the list of countries, such as `"countries": ["GB", "USA", ...]`, the first item (`GB`) has index `0`, the second item (`USA`) has index `1`, and so on.
            In the example, `USA` is invalid, because it should be a 2-letter code.
            In such a case, the error will indicate that `countries[1]` is invalid, thus pointing to the second item in the array, i.e. `USA`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                missing_conditional_fields:
                  summary: Contact IDs or product are required when holder ID not provided
                  value:
                    code: 3000
                    message: Either contact_ids or product must be present when holder_id is empty
                contact_ids_and_product_not_allowed_with_holder_id:
                  summary: Contact IDs and product are not allowed when holder ID present
                  value:
                    code: 3000
                    message: Both contact_ids and product must be empty when holder_id is present
                references_not_allowed_with_holder_id:
                  summary: References are not allowed when holder ID present
                  value:
                    code: 3000
                    message: references must be empty when holder_id is present
                missing_required_field:
                  summary: Merchant controls are missing merchant IDs
                  value:
                    code: 3000
                    message: merchant_ids is empty
                invalid_json:
                  summary: Invalid request body
                  value:
                    code: 3000
                    message: 'Cannot parse request: invalid JSON'
                product_not_found:
                  summary: Card product not found
                  value:
                    code: 2101
                    message: Product MJB not found
                cannot_add_contact_ids:
                  summary: Contact ID(s) not found
                  value:
                    code: 2101
                    message: Unable to attach contactIds
                wrong_spending_period_date:
                  summary: Wrong spending period date
                  value:
                    code: 2101
                    message: Spending period start_date must be in the future
                invalid_account_id:
                  summary: Invalid account ID
                  value:
                    code: 2101
                    message: Invalid account ids provided=[0f187658-8c07-491f-9129-ae567b829137]
                invalid_country_code:
                  $ref: '#/components/examples/cardErrorBadCountryCode'
        '404':
          description: |-
            Team member not found

            Returned when the team member specified as cardholder in `holder_id` does not exist.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                code: 3042
                message: Team member not found
        '422':
          description: |-
            Unprocessable entity

            For example, the team member exceeds the limit for virtual cards per account, or an unexpected error occurred when the initial request with the same `request_id` was sent.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                cards_limit_exceeded:
                  summary: Virtual cards limit per account exceeded
                  value:
                    code: 3087
                    message: Active virtual cards limit is exceeded for the employee
                unexpected_error:
                  summary: Unexpected error on initial request
                  value:
                    code: 33009
                    message: 'Idempotent replay failed: first execution was not successful'
        '429':
          description: Concurrent requests with the same idempotency key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                code: 3162
                message: Parallel requests conflict. Please synchronize your requests. request_id=5baa6989-ae59-4668-bb09-042fca180518
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /cards/{card_id}:
    get:
      servers:
        - url: https://b2b.revolut.com/api/1.0
          description: Production server (uses live data)
      summary: Retrieve card details
      operationId: getCard
      description: |-
        Get the details of a specific card, based on its ID.

        :::note
        - This feature is not available in Sandbox.
        - To increase your account's card limits, please contact [Revolut API Support](mailto:api-requests@revolut.com).
        :::

        For more information, see the guides: [Manage cards](https://developer.revolut.com/docs/guides/manage-accounts/cards/manage-cards).
      security:
        - AccessToken:
            - READ
      tags:
        - Cards
      parameters:
        - name: card_id
          in: path
          required: true
          description: The ID of the card.
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Information about the card
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CardResponseWithTerminated'
              examples:
                virtual_card:
                  $ref: '#/components/examples/cardVirtualDetails'
