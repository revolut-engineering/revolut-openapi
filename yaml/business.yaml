  /cards/{card_id}/contacts:
    put:
      servers:
        - url: https://b2b.revolut.com/api/1.0
          description: Production server (uses live data)
      summary: Update card contacts
      operationId: updateCardContacts
      description: |-
        Update the list of card contacts (`contact_ids`) for a [company card](https://developer.revolut.com/docs/guides/manage-accounts/cards/manage-cards#different-types-of-cards).

        :::note
        - This feature is not available in Sandbox.
        - To increase your account's card limits, please contact [Revolut API Support](mailto:api-requests@revolut.com).
        :::

        You can only update cards with existing contacts.
        If a card does not have any contacts assigned, this operation is not allowed.

        On success, the updated list of contacts is returned.

        :::warning
        This operation **overrides** the existing contacts.
        This means that it removes the current list completely, and replaces it with the new one provided in this request.

        If you want to add new contacts for the card instead of replacing the existing ones, make sure that you [fetch](https://developer.revolut.com/docs/api/business#get-card) the existing contacts first, and include them in your request.
        :::

        For more information, see the guides: [Manage cards](https://developer.revolut.com/docs/guides/manage-accounts/cards/manage-cards).
      security:
        - AccessToken:
            - WRITE
      tags:
        - Cards
      parameters:
        - name: card_id
          in: path
          required: true
          description: The ID of the card whose contacts should be updated.
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        description: |-
          New contacts for the card.
          :::warning
          This will **override** the existing list of contacts.
          :::
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CardContacts'
            examples:
              list_of_contacts:
                $ref: '#/components/examples/CardContacts'
      responses:
        '200':
          description: Updated list of contacts
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CardContacts'
              examples:
                list_of_contacts:
                  $ref: '#/components/examples/CardContacts'
        '400':
          description: |-
            Bad Request

            Returned, for example, when the provided list of contacts is empty or too many contacts are provided, or when it's malformed or contains incorrect values.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                wrong_size:
                  summary: Wrong number of contacts
                  value:
                    code: 2101
                    message: Card contacts size must be between 1 and 5
                incorrect_values:
                  summary: Incorrect value(s)
                  value:
                    code: 3000
                    message: Value of field '[0]' is not in correct format
                invalid_json:
                  summary: Incorrect request format
                  value:
                    code: 3000
                    message: 'Cannot parse request: invalid JSON'
                invalid_id:
                  $ref: '#/components/examples/cardErrorBadId'
        '404':
          description: |-
            Card not found

            The card for which you wish to update contacts does not exist.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                code: 1214
                message: Card not found
        '422':
          description: |-
            Unprocessable Content

            Returned, for example, when you try to update contacts for a card other than a [company card](https://developer.revolut.com/docs/guides/manage-accounts/cards/manage-cards#different-types-of-cards).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                code: 33011
                message: Card contacts are not supported for the card=23a8befd-7b7b-4922-a00f-188b0153730b
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /cards/{card_id}/references:
    put:
      servers:
        - url: https://b2b.revolut.com/api/1.0
          description: Production server (uses live data)
      summary: Update card references
      operationId: updateCardReferences
      description: |-
        Update the list of [references (`references`)](https://developer.revolut.com/docs/api/business#get-card#response) for a [company](https://developer.revolut.com/docs/guides/manage-accounts/cards/manage-cards#different-types-of-cards) or [auto-issued card](https://developer.revolut.com/docs/guides/manage-accounts/cards/manage-cards#different-types-of-cards).

        :::note
        - This feature is not available in Sandbox.
        - To increase your account's card limits, please contact [Revolut API Support](mailto:api-requests@revolut.com).
        :::

        References can be amended up to 10 times.
        Reference names must be unique.

        References are only supported for cards owned by the business (i.e. [company](https://developer.revolut.com/docs/guides/manage-accounts/cards/manage-cards#different-types-of-cards) or [auto-issued cards](https://developer.revolut.com/docs/guides/manage-accounts/cards/manage-cards#different-types-of-cards)).
        They can't be added to [team member cards](https://developer.revolut.com/docs/guides/manage-accounts/cards/manage-cards#different-types-of-cards) (i.e. with `holder_id` present). 

        The references recorded on a transaction are those assigned to the card at the time the transaction took place.
        If the references are amended, they will only be applied to future transactions.
        Existing transaction are not affected.

        On success, the updated list of references is returned.

        :::warning
        This operation **overrides** the existing references.
        This means that it removes the current list completely, and replaces it with the new one provided in this request.

        If you want to add references to the card instead of replacing the existing ones, make sure that you [fetch](https://developer.revolut.com/docs/api/business#get-card) the existing references first, and include them in your request.

        To delete existing references without adding new ones, simply provide an empty list.
        :::

        For more information, see the guides: [Manage cards](https://developer.revolut.com/docs/guides/manage-accounts/cards/manage-cards).
      security:
        - AccessToken:
            - WRITE
      tags:
        - Cards
      parameters:
        - name: card_id
          in: path
          required: true
          description: The ID of the card whose references should be amended.
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        description: |-
          References for the card.
          Up to 5 name-value pairs assigned to the card for tracking.
          :::warning
          This will **override** the existing references.
          :::
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CardReferences'
            examples:
              list_of_references:
                $ref: '#/components/examples/CardReferences'
      responses:
        '200':
          description: |-
            Updated list of references.             
            Up to 5 name-value pairs assigned to the card for tracking.
          content:
            application/json:
              schema:
                description: |-
                  References for the card.
                  Up to 5 name-value pairs assigned to the card for tracking.

                  The names must be unique.
                  The references can be amended up to 10 times.
                $ref: '#/components/schemas/CardReferences'
              examples:
                list_of_references:
                  $ref: '#/components/examples/CardReferences'
        '400':
          description: |-
            Bad Request

            Returned, for example, when you provide duplicate reference names, too many references, the reference names or values are too long, or your request is malformed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                duplicate_names:
                  summary: Duplicate names
                  value:
                    code: 2101
                    message: Reference names must be unique
                too_long_names:
                  summary: Too long reference name(s)
                  value:
                    code: 3000
                    message: name cannot be longer than 30
                too_long_values:
                  summary: Too long reference value(s)
                  value:
                    code: 3000
                    message: value cannot be longer than 30
                wrong_size:
                  summary: Too many references
                  value:
                    code: 3000
                    message: references size must be not greater than 5
                invalid_json:
                  summary: Incorrect request format
                  value:
                    code: 3000
                    message: 'Cannot parse request: invalid JSON'
                invalid_id:
                  $ref: '#/components/examples/cardErrorBadId'
        '404':
          description: |-
            Card not found

            The card for which you wish to update references does not exist.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                code: 1214
                message: Card not found
        '422':
          description: |-
            Unprocessable Content

            Returned, for example, when you try to amend references more than 10 times, or when you try to add them to a card that does not support references, like a card with a `holder_id` present.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                update_limit_exceeded:
                  summary: References can be amended up to 10 times
                  value:
                    code: 3549
                    message: Card references update limit exceeded
                unsupported_card:
                  summary: References can't be assigned to cards with holder_id
                  value:
                    code: 33012
                    message: Card references are not supported for the card=a5c697d1-84ae-40b2-879a-a17aab3362bb
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
