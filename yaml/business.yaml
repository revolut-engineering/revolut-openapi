          $ref: '#/components/schemas/Currency'
        amount:
          type: number
          format: double
          description: |-
            The amount of currency.
            Specify **only** if you want to buy currency.
      required:
        - account_id
        - currency
    ExchangeRateResponse:
      type: object
      properties:
        from:
          description: The money to sell.
