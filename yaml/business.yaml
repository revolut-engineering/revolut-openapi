  /sandbox/transactions/{id}/{action}:
    servers:
      - url: https://sandbox-b2b.revolut.com/api/1.0
        description: Sandbox server (uses test data)
    post:
      summary: Simulate a transfer state update (Sandbox only)
      operationId: simulateTransferStateUpdate
      description: |-
        Simulate a transfer state change in the Sandbox environment. 

        For example, after you make a transfer in Sandbox, you can change its state to `completed`. The resulting state is final and cannot be changed.

        For more information, see the guides: [Test your flows with simulations (Sandbox only)](https://developer.revolut.com/docs/guides/manage-accounts/api-usage-and-testing/test-flows-with-simulations).
      parameters:
        - name: id
          in: path
          schema:
            type: string
            format: uuid
          description: The ID of the transfer whose state you want to update.
          required: true
        - name: action
          in: path
          schema:
            type: string
            enum:
              - complete
              - revert
              - decline
              - fail
            description: |-
              Indicates the transaction state update. Possible values:
              - `complete` - Transaction is successfully processed.
              - `revert` - Transaction is reverted by the system or company, but not the user. This can happen for a variety of reasons, for example, the receiver being inaccessible.
              - `decline` - Transaction is declined to the user for a good reason, such as insufficient account balance, wrong receiver information, etc.
              - `fail` - Transaction fails during initiation or completion. This can happen for a variety of reasons, for example, invalid API calls, blocked payments, etc.
          required: true
      security:
        - AccessToken:
            - WRITE
      responses:
        '200':
          description: Information about the updated transfer state
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    format: uuid
                    description: The ID of the transfer whose state was updated.
                  state:
                    type: string
                    enum:
                      - completed
                      - reverted
                      - declined
                      - failed
                    description: |-
                      Indicates the simulated transaction state. Possible values:
                      - `completed` - Transaction was successfully processed.
                      - `reverted` - Transaction was reverted by the system or company, but not the user. This can happen for a variety of reasons, for example, the receiver being inaccessible.
                      - `declined` - Transaction was declined to the user for a good reason, such as insufficient account balance, wrong receiver information, etc.
                      - `failed` - Transaction failed during initiation or completion. This can happen for a variety of reasons, for example, invalid API calls, blocked payments, etc.
                  created_at:
                    type: string
                    format: date-time
                    description: The date and time the transfer was created in [ISO 8601](https://en.wikipedia.org/wiki/ISO_8601) format.
                  completed_at:
                    type: string
                    format: date-time
                    description: The date and time the transfer was completed in [ISO 8601](https://en.wikipedia.org/wiki/ISO_8601) format.
                required:
                  - id
                  - state
                  - created_at
              example:
                id: a6ea39d7-62c9-481c-8ba6-8a887a44c486
                state: completed
                created_at: '2023-01-23T08:39:35.811005Z'
                completed_at: '2023-01-23T08:39:35.811005Z'
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      tags:
        - Simulations
  /sandbox/topup:
    servers:
      - url: https://sandbox-b2b.revolut.com/api/1.0
        description: Sandbox server (uses test data)
    post:
      summary: Simulate an account top-up (Sandbox only)
      operationId: simulateTopUp
      description: |-
        Simulate a top-up of your account in the Sandbox environment. 

        This is useful during testing, when you run out of money in your test account and need to add more.

        For more information, see the guides: [Test your flows with simulations (Sandbox only)](https://developer.revolut.com/docs/guides/manage-accounts/api-usage-and-testing/test-flows-with-simulations).
      requestBody:
        description: Top-up details
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                account_id:
                  type: string
                  format: uuid
                  description: The ID of the account that you want to top up.
                amount:
                  type: number
                  format: double
                  description: The amount with which you want to top up the account.
                  maximum: 10000
                currency:
                  $ref: '#/components/schemas/Currency'
                  description: The currency of the account that you want to top up.
                reference:
                  type: string
                  description: A short description for your top up.
                  default: Test Top-up
                state:
                  type: string
                  description: The state to which you want to set the top-up transaction.
                  enum:
                    - pending
                    - completed
                    - reverted
                    - failed
                  default: completed
              required:
                - account_id
                - amount
                - currency
            example:
              account_id: e042f1fe-f721-49cc-af82-db7a6c46944f
              amount: 100
              currency: GBP
              reference: Test Top-up
              state: completed
      security:
        - AccessToken:
            - WRITE
      responses:
        '200':
          description: Information about the top-up state
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    format: uuid
                    description: The ID of the account that was topped up.
                  state:
                    type: string
                    description: The state of the top-up transaction.
                    enum:
                      - pending
                      - completed
                      - reverted
                      - failed
                  created_at:
                    type: string
                    format: date-time
                    description: The date and time the transaction was created in [ISO 8601](https://en.wikipedia.org/wiki/ISO_8601) format.
                  completed_at:
                    type: string
                    format: date-time
                    description: The date and time the transaction was completed in [ISO 8601](https://en.wikipedia.org/wiki/ISO_8601) format.
                required:
                  - id
                  - state
                  - created_at
              example:
                id: 330953b8-b089-4cfd-9f03-e88173d64248
                state: completed
                created_at: '2023-01-23T08:39:35.811005Z'
                completed_at: '2023-01-23T08:39:35.811005Z'
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      tags:
        - Simulations
  /tax-rates:
    post:
      summary: Create a new tax rate
      operationId: createTaxRate
      description: |-
        Add a new tax rate to the list of tax rates that can be applied to your financial records, such as expenses.

        :::note
        This operation is not supported for [externally managed tax rates](https://developer.revolut.com/docs/guides/manage-accounts/accounting/manage-tax-rates#externally-managed-settings).
        :::

        For more details, see the guides: [Manage accounting settings](https://developer.revolut.com/docs/guides/manage-accounts/accounting/manage-accounting-settings) and [Manage tax rates](https://developer.revolut.com/docs/guides/manage-accounts/accounting/manage-tax-rates).
      security:
        - AccessToken:
            - WRITE
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTaxRateRequest'
            example:
              name: 20% (VAT on Expenses)
              percentage: 20
      responses:
        '201':
          description: |-
            Resource created

            On successful creation, the response returns only the ID of the new resource (i.e. the tax rate), even if the resource has more properties.
            To get all the details of the tax rate, use the returned resource ID with a [GET request](https://developer.revolut.com/docs/api/business#get-tax-rate).
          $ref: '#/components/responses/ResourceCreatedResponse'
        '400':
          description: |-
            Bad Request

            Returned, for example, when a required parameter is missing or malformatted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorWithId'
              examples:
                param_required:
                  summary: Required parameter is missing
                  value:
                    error_id: fa12f45e-0ebf-4f7c-88e0-ebb7a1441a18
                    code: 2101
                    message: '''percentage'' is required'
                bad_param_type:
                  summary: Incorrect parameter type
                  value:
                    error_id: 29146977-8042-446f-b362-675e2921d71c
                    code: 2101
                    message: '''percentage'' must be a number'
                param_value_too_low:
                  summary: Parameter value too low
                  value:
                    error_id: b5a51cd1-9d0f-4074-adae-af224b14c830
                    code: 2101
                    message: '''percentage'' must be at least 0'
                param_value_too_high:
                  summary: Parameter value too high
                  value:
                    error_id: 89ceb92e-4633-4f78-8d40-42dadc380511
                    code: 2101
                    message: '''percentage'' must be at most 100'
                invalid_json:
                  summary: Invalid JSON
                  value:
                    error_id: df7b76b2-1313-42f0-8c0b-3673c665f135
                    code: 2101
                    message: Request body is not valid JSON
                param_value_too_short:
                  summary: Parameter value too short
                  value:
                    error_id: 7acc6073-5290-45f8-8956-c79d487ef1e5
                    code: 2101
                    message: '''name'' must be at least 1 character'
                param_value_too_long:
                  summary: Parameter value too long
                  value:
                    error_id: c4da2d3c-1cd8-4bbc-ac43-233575e471b7
                    code: 2101
                    message: '''name'' must be at most 20 characters'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          description: |-
            Conflict

            Request conflicts with the current state of the resource.
            Returned, for example, when a tax rate with the provided name already exists.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorWithId'
              example:
                error_id: 8c08b656-4e57-4768-ab6e-f281da25aa2b
                code: 3505
                message: Tax rate with name My Unique Rate already exists
        '422':
          description: |-
            Unprocessable entity - tax rate cannot be created due to business rules 

            Returned, for example, when you have an accounting software integration connected to your Revolut Business account, and tax rates are managed by that integration.

            The request is well-formed and the server understands it, but the operation cannot be performed because the resource state doesn't permit it.
            Retrying the same request won't succeed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorWithId'
              examples:
                cannot_modify_externally_managed_resource:
                  summary: Tax rates are managed by integration, cannot be created manually
                  value:
                    error_id: e950c41e-cfd6-4e04-bd79-2d57a3951774
                    code: 3514
                    message: Tax rates are managed by your connected accounting integration and cannot be modified manually
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorWithId'
      tags:
        - Accounting
        - Tax rates
    get:
      summary: Retrieve a list of tax rates
      operationId: getTaxRates
      description: |-
        Get available tax rates based on the provided query criteria.

        :::note
        The API returns a maximum of 500 tax rates per request. 
        The default page size is 100.
        :::

        The tax rates are sorted by the `created_at` date in reverse chronological order, and they're **paginated**.
        The page size, that is, the maximum number of tax rates returned per page is specified by the `limit` parameter. 
        - If the number of results exceeds the page size, the response also returns a cursor for the next page under `next_page_token`.        
          To get the next page of results, make a new request using that `next_page_token` value in `page_token`.
        - If the number of results is smaller than the page size, `next_page_token` is not returned.

        For more details, see the guides: [Manage accounting settings](https://developer.revolut.com/docs/guides/manage-accounts/accounting/manage-accounting-settings) and [Manage tax rates](https://developer.revolut.com/docs/guides/manage-accounts/accounting/manage-tax-rates).
